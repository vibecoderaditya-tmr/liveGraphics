<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Live Ticker</title>
<link rel="icon" type="image/x-icon" href="/icon.ico">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --width-sm: 50px;
    --width-lg: 70px;
    --width-team: 120px;
    --pts-alive-gap: -10px;

    --header-bg:       #c1a882;
    --header-color:    #000000;
    --header-border:   #c1a882;
    --team-text-pad:   12px;
    --header-text-pad: 24px;

    --row-bg:          #48321e;
    --row-bg-alt:      #48321e;
    --row-color:       #ffffff;
    --row-border:      #48321e;
    --row-pts-color:   #ffffff;
    --alive:           #c1a882;
    --dead:            #000000;
    --bar-width:       8px;
    --bar-height:      28px;
    --bar-gap:         3px;

    --logo-size:       36px;
    --header-gap:      5px;
    --row-gap:          5px;
    --row-height:      40px;
    --alive-pad-left:  19px;

    --pts-col-width:   var(--width-sm);
    --pts-duration:    0.45s;
    --pts-easing:      cubic-bezier(0.4, 0, 0.2, 1);

    --box-width: calc(
      2px +
      16px +
      var(--width-sm) +
      var(--width-team) +
      var(--width-sm) +
      var(--width-sm) +
      var(--pts-alive-gap) +
      var(--width-lg)
    );

    --canvas-width:    1920px;
    --canvas-height:   1080px;
  }

  html, body {
    width: var(--canvas-width);
    height: var(--canvas-height);
    background: transparent;
    overflow: hidden;
    font-family: 'Oswald', sans-serif;
  }

  .ticker-wrap {
    width: var(--canvas-width);
    height: var(--canvas-height);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    padding-top: 60px;
  }

  .ticker-box {
    width: var(--box-width);
    transition: width var(--pts-duration) var(--pts-easing);
  }
  .ticker-box.pts-hidden {
    width: calc(var(--box-width) - var(--pts-col-width));
  }

  .ticker-header {
    display: flex;
    align-items: center;
    height: 40px;
    background: var(--header-bg);
    border: 1px solid var(--header-border);
    border-radius: 6px 6px 0 0;
    padding: 0 16px 0 4px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--header-color);
    overflow: hidden;
  }

  .ticker-rows {
    position: relative;
    height: calc(var(--row-height) * 12 + var(--row-gap) * 11);
  }

  .ticker-header {
    margin-bottom: var(--header-gap);
  }

  /* ── Row wrapper: handles position, top, display:none, and the glow filter.
     clip-path is applied to .ticker-row (the child), NOT the wrapper.
     filter: drop-shadow on the wrapper is composited AFTER the child's
     clip-path, so the glow bleeds outside the clipped area freely. ── */
  .row-wrap {
    position: absolute;
    left: 0;
    right: 0;
    height: var(--row-height);
    transition: top 0.6s ease-in-out;
  }

  /* Golden glow lives on the wrapper — never clipped */
  .row-wrap.top-frag-wrap {
    animation: top-frag-glow 2.5s ease-in-out infinite;
    z-index: 2;
  }
  @keyframes top-frag-glow {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(255,200,0,0.7)) drop-shadow(0 0 12px rgba(255,180,0,0.5)); }
    50%       { filter: drop-shadow(0 0 10px rgba(255,220,60,1))  drop-shadow(0 0 22px rgba(255,200,0,0.8)); }
  }

  .ticker-row {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    height: var(--row-height);
    padding: 0 16px 0 4px;
    background: var(--row-bg);
    border-bottom: 1px solid var(--row-border);
    font-size: 20px;
    color: var(--row-color);
    overflow: hidden;
  }
  /* Background pulse on the row itself */
  .row-wrap.top-frag-wrap .ticker-row {
    animation: top-frag-bg 2.5s ease-in-out infinite;
  }
  @keyframes top-frag-bg {
    0%, 100% { background-color: #d4a017; }
    50%       { background-color: #ffd700; }
  }

  .ticker-row .col-rank,
  .ticker-row .col-elims,
  .ticker-header .col-rank,
  .ticker-header .col-elims {
    width: var(--width-sm);
    flex-shrink: 0;
  }
  .ticker-row .col-alive,
  .ticker-header .col-alive {
    width: var(--width-lg);
    flex-shrink: 0;
  }
  .ticker-row .col-team,
  .ticker-header .col-team {
    width: var(--width-team);
    flex-shrink: 0;
  }

  .col-pts {
    width: var(--pts-col-width);
    flex-shrink: 0;
    overflow: hidden;
    white-space: nowrap;
    opacity: 1;
    transition:
      width     var(--pts-duration) var(--pts-easing),
      opacity   calc(var(--pts-duration) * 0.6) var(--pts-easing),
      padding   var(--pts-duration) var(--pts-easing);
  }
  .pts-hidden .col-pts {
    width: 0 !important;
    opacity: 0 !important;
    padding: 0 !important;
    border: none !important;
  }

  .ticker-row .col-rank    { display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 700; }
  .ticker-row .col-team    { text-align: left;   display: flex; align-items: center; gap: 10px; padding-left: var(--team-text-pad); }
  .ticker-row .col-elims   { display: flex; align-items: center; justify-content: center; text-align: center; }
  .ticker-row .col-pts     { display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 700; color: var(--row-pts-color); }
  .ticker-row .col-alive   { position: relative; text-align: center; display: flex; align-items: center; justify-content: center; gap: var(--bar-gap); margin-left: var(--pts-alive-gap); padding-left: 27px; }
  .col-alive.struck {
    position: relative;
  }
  .col-alive.struck::after {
    content: '';
    position: absolute;
    left: 27px;
    right: 0;
    top: 50%;
    height: 5px;
    background: var(--alive);
    transform: translateY(-50%);
    z-index: 1;
    pointer-events: none;
  }

  /* ── Directional wipe-reveal animation states ─────────────────────────
     clip-path is applied to .ticker-row (NOT .row-wrap), so the glow
     filter on .row-wrap is never clipped.
  ------------------------------------------------------------------- */
  .anim-hide-left   { clip-path: inset(0 100% 0 0); }
  .anim-hide-right  { clip-path: inset(0 0 0 100%); }
  .anim-in          { clip-path: inset(0 0 0 0); }

  .trans-anim {
    transition: clip-path  0.55s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .trans-anim-out {
    transition: clip-path  0.5s  cubic-bezier(0.55,0.06,0.68,0.53);
  }

  .elim-overlay.not-played-overlay {
    clip-path: inset(0 0 0 0);
    background: rgba(0,0,0,0.6);
    opacity: 1;
    transition: none;
  }
  .elim-overlay.not-played-overlay span {
    display: none;
  }

  .alive-bar {
    width: var(--bar-width);
    height: var(--bar-height);
    background: var(--dead);
    border-radius: 2px;
    transition: background 0.3s;
  }
  .alive-bar.active {
    background: var(--alive);
  }

  .elim-overlay {
    position: absolute;
    align-self: unset;
    margin: 0;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 6px;
    z-index: 3;
    pointer-events: none;
    background: linear-gradient(90deg, rgba(200,40,40,0.95), rgba(160,20,20,0.95));
    clip-path: inset(0 100% 0 0);
    transition: clip-path 0.5s ease-in-out;
  }
  .elim-overlay.show {
    clip-path: inset(0 0 0 0);
  }
  .elim-overlay.exit {
    clip-path: inset(0 0 0 100%);
  }
  .elim-overlay.final {
    clip-path: inset(0 0 0 0);
    background: rgba(0,0,0,0.5);
    transition: background 0.4s ease-in-out;
  }
  .elim-overlay.final span {
    opacity: 0;
  }

  .ticker-header .col-rank  { display: flex; align-items: center; justify-content: center; text-align: center; }
  .ticker-header .col-team  { text-align: left; padding-left: var(--header-text-pad); display: flex; align-items: center; }
  .ticker-header .col-elims { display: flex; align-items: center; justify-content: center; text-align: center; }
  .ticker-header .col-pts   { display: flex; align-items: center; justify-content: center; text-align: center; }
  .ticker-header .col-alive { text-align: center; display: flex; align-items: center; justify-content: center; margin-left: var(--pts-alive-gap); padding-left: 19px; }

  .logo-wrap {
    width: var(--row-height);
    height: var(--row-height);
    border-radius: 50%;
    background: #58412a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .logo-wrap .team-logo {
    width: var(--logo-size);
    height: var(--logo-size);
    object-fit: contain;
  }
  .team-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-box">
    <div class="ticker-header">
      <span class="col-rank">RANK</span>
      <span class="col-team">TEAMS</span>
      <span class="col-elims">ELIMS</span>
      <span class="col-pts">PTS</span>
      <span class="col-alive">ALIVE</span>
    </div>
    <div class="ticker-rows" id="ticker-rows">
    </div>
  </div>
</div>

<script>
const isFileProtocol = location.protocol === "file:";
function fileRelativeDir() {
  const p = location.pathname;
  return p.substring(0, p.lastIndexOf("/") + 1);
}
const LOGO_BASE = isFileProtocol ? `${fileRelativeDir()}logos/` : "/logos/";
const LOGO_EXT  = ".webp";

function buildCaseVariants(name) {
  const clean = String(name).trim().replace(/[^a-zA-Z0-9_-]/g, "");
  const lower = clean.toLowerCase();
  const upper = clean.toUpperCase();
  const capitalized = lower.charAt(0).toUpperCase() + lower.slice(1);
  return [...new Set([lower, upper, capitalized])];
}

function loadLogo(imgEl, tag) {
  const variants = buildCaseVariants(tag);
  let attempt = 0;
  function tryNext() {
    if (attempt >= variants.length) {
      imgEl.style.display = "none";
      imgEl.onerror = null;
      return;
    }
    imgEl.src = LOGO_BASE + variants[attempt] + LOGO_EXT;
    attempt++;
    imgEl.onerror = tryNext;
  }
  tryNext();
}

const NUM_ROWS = 12;
const rowsContainer = document.getElementById("ticker-rows");

// Each row is now: .row-wrap > .ticker-row
// .row-wrap  → position/top/display/glow-filter  (never clip-pathed)
// .ticker-row → clip-path wipe animations         (clipped, but glow is on parent)
function buildRows() {
  rowsContainer.innerHTML = "";
  for (let i = 0; i < NUM_ROWS; i++) {
    const wrap = document.createElement("div");
    wrap.className = "row-wrap";
    wrap.dataset.slot = i;

    const row = document.createElement("div");
    row.className = "ticker-row";
    row.innerHTML = `
      <span class="col-rank"></span>
      <span class="col-team">
        <span class="logo-wrap"><img class="team-logo" src="" alt=""></span>
        <span class="team-name">—</span>
      </span>
      <span class="col-elims"></span>
      <span class="col-pts"></span>
      <span class="col-alive">
        <span class="alive-bar"></span>
        <span class="alive-bar"></span>
        <span class="alive-bar"></span>
        <span class="alive-bar"></span>
      </span>
      <div class="elim-overlay"><span>ELIMINATED</span></div>
    `;
    wrap.appendChild(row);
    rowsContainer.appendChild(wrap);
  }
}
buildRows();

// rowEls now points to the .row-wrap elements (position/display owners)
// innerRow(wrap) returns the .ticker-row inside (clip-path/content owner)
const rowEls = Array.from(document.querySelectorAll('.row-wrap'))
  .sort((a, b) => Number(a.dataset.slot) - Number(b.dataset.slot));

function innerRow(wrap) { return wrap.querySelector('.ticker-row'); }

const firebaseConfig = {
  apiKey:            "AIzaSyC21mdsgyIEqXT7ujFbi0xcVAMRZxxqB1I",
  authDomain:        "tmraditya-1ceb7.firebaseapp.com",
  databaseURL:       "https://tmraditya-1ceb7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "tmraditya-1ceb7",
  storageBucket:     "tmraditya-1ceb7.firebasestorage.app",
  messagingSenderId: "317037791388",
  appId:             "1:317037791388:web:755b5a18bb77aa140a4559"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let teamsData = null;
let liveData  = {};

let prevElims = {};
let prevPts   = {};
let currentTopFragTag = null;

function animateCount(el, from, to) {
  if (from === to) { el.textContent = to; return; }
  const step = from < to ? 1 : -1;
  const duration = 300;
  const interval = Math.max(20, Math.floor(duration / Math.abs(to - from)));
  let current = from;
  el.textContent = current;
  const timer = setInterval(() => {
    current += step;
    if ((step > 0 && current >= to) || (step < 0 && current <= to)) {
      clearInterval(timer);
      el.textContent = to;
    } else {
      el.textContent = current;
    }
  }, interval);
}

function renderTicker() {
  const entries = Object.keys(teamsData || {}).map(tag => ({
    tag:  tag,
    name: teamsData[tag]["1_teamName"] || tag,
    pts:  Number(teamsData[tag]["5_totalPoints"]) || 0,
  }));
  entries.sort((a, b) => b.pts - a.pts);

  const rowHeight = 40;
  const rowGap    = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--row-gap')) || 0;

  // ── row ↔ tag association (on .row-wrap) ─────────────────────────
  const activeTags = new Set(entries.map(e => e.tag));
  for (const wrap of rowEls) {
    if (wrap.dataset.tag && !activeTags.has(wrap.dataset.tag)) delete wrap.dataset.tag;
  }
  const assigned = new Set();
  for (const wrap of rowEls) if (wrap.dataset.tag) assigned.add(wrap.dataset.tag);
  for (const e of entries) {
    if (!assigned.has(e.tag)) {
      const free = rowEls.find(r => !r.dataset.tag);
      if (free) { free.dataset.tag = e.tag; assigned.add(e.tag); }
    }
  }

  // ── Top-fragger determination ─────────────────────────────────────
  let maxKills = -Infinity;
  for (const e of entries) {
    const live = liveData[e.tag];
    if (!live) continue;
    const aliveCount = Number(live["3_playersAlive"]) || 0;
    if (aliveCount <= 0) continue;
    const k = Number(live["5_totalKills"]) || 0;
    if (k > maxKills) maxKills = k;
  }

  let topFragTag = null;
  if (maxKills > 0) {
    const killLeaders = entries.filter(e => {
      const live = liveData[e.tag];
      return live
        && (Number(live["3_playersAlive"]) || 0) > 0
        && (Number(live["5_totalKills"]) || 0) === maxKills;
    });

    if (killLeaders.length === 1) {
      topFragTag = killLeaders[0].tag;
    } else if (killLeaders.length > 1) {
      let maxPts = -Infinity, maxPtsCount = 0;
      for (const c of killLeaders) {
        if (c.pts > maxPts) { maxPts = c.pts; maxPtsCount = 1; }
        else if (c.pts === maxPts) { maxPtsCount++; }
      }
      topFragTag = (maxPtsCount === 1)
        ? killLeaders.find(c => c.pts === maxPts).tag
        : (currentTopFragTag && killLeaders.some(c => c.tag === currentTopFragTag))
          ? currentTopFragTag
          : null;
    }
  }
  currentTopFragTag = topFragTag;

  for (const wrap of rowEls) {
    const row = innerRow(wrap);

    if (!wrap.dataset.tag || !activeTags.has(wrap.dataset.tag)) {
      wrap.style.display = "none";
      wrap.classList.remove("top-frag-wrap");
      row.querySelector(".col-rank").textContent = "";
      row.querySelector(".team-logo").src = "";
      row.querySelector(".team-logo").style.display = "none";
      row.querySelector(".logo-wrap").style.display = "none";
      row.querySelector(".team-name").textContent = "";
      row.querySelector(".col-elims").textContent = "";
      row.querySelector(".col-pts").textContent = "";
      row.querySelectorAll(".alive-bar").forEach(b => b.classList.remove("active"));
      row.querySelector(".elim-overlay").classList.remove("show", "exit", "final", "not-played-overlay");
      row.querySelector(".col-alive").classList.remove("struck");
      clearTimeout(wrap._elimT1);
      clearTimeout(wrap._elimT2);
      wrap._elimT1 = null;
      wrap._elimT2 = null;
      wrap._elimStage = 0;
      continue;
    }

    const eIdx = entries.findIndex(en => en.tag === wrap.dataset.tag);
    const e = entries[eIdx];
    const live = liveData[e.tag] || {};

    wrap.style.display = "";

    const newTop = (eIdx * (rowHeight + rowGap)) + "px";
    // Only smooth-transition top if the row is fully visible (anim-in).
    // Mid-animation rows get snapped so the wipe finishes cleanly.
    if (row.classList.contains("anim-in")) {
      wrap.style.top = newTop;
    } else {
      const prevTransition = wrap.style.transition;
      wrap.style.transition = "none";
      wrap.style.top = newTop;
      void wrap.offsetHeight;
      wrap.style.transition = prevTransition;
    }

    const rankEl  = row.querySelector(".col-rank");
    const logoEl  = row.querySelector(".team-logo");
    const nameEl  = row.querySelector(".team-name");
    const elimsEl = row.querySelector(".col-elims");
    const ptsEl   = row.querySelector(".col-pts");
    const aliveEl = row.querySelector(".col-alive");

    const kills = Number(live["5_totalKills"]) || 0;
    const alive = Number(live["3_playersAlive"]) || 0;
    const elimOverlay = row.querySelector(".elim-overlay");
    const notPlayed = !liveData[e.tag];

    // ── Top-fragger glow on the wrapper (never clipped) ─────────────
    wrap.classList.toggle("top-frag-wrap", !notPlayed && topFragTag === e.tag);

    if (notPlayed) {
      elimOverlay.classList.remove("show", "exit", "final");
      elimOverlay.classList.add("not-played-overlay");
      aliveEl.classList.add("struck");
      clearTimeout(wrap._elimT1);
      clearTimeout(wrap._elimT2);
      wrap._elimT1 = null;
      wrap._elimT2 = null;
      wrap._elimStage = 0;
    } else {
      elimOverlay.classList.remove("not-played-overlay");
      aliveEl.classList.remove("struck");
      if (alive === 0) {
        if (!wrap._elimStage) {
          wrap._elimStage = 1;
          elimOverlay.classList.add("show");
          wrap._elimT1 = setTimeout(() => {
            elimOverlay.classList.remove("show");
            elimOverlay.classList.add("exit");
            wrap._elimStage = 2;
            wrap._elimT2 = setTimeout(() => {
              elimOverlay.classList.remove("exit");
              elimOverlay.classList.add("final");
              wrap._elimStage = 3;
            }, 500);
          }, 1500);
        }
      } else {
        elimOverlay.classList.remove("show", "exit", "final");
        clearTimeout(wrap._elimT1);
        clearTimeout(wrap._elimT2);
        wrap._elimT1 = null;
        wrap._elimT2 = null;
        wrap._elimStage = 0;
      }
    }

    rankEl.textContent  = "#" + (eIdx + 1);
    row.querySelector(".logo-wrap").style.display = "flex";
    logoEl.style.display = "block";
    loadLogo(logoEl, e.tag);
    nameEl.textContent  = e.tag;
    const prevK = prevElims[e.tag];
    if (prevK !== undefined && prevK !== kills) animateCount(elimsEl, prevK, kills);
    else elimsEl.textContent = kills;
    prevElims[e.tag] = kills;
    const prevP = prevPts[e.tag];
    if (prevP !== undefined && prevP !== e.pts) animateCount(ptsEl, prevP, e.pts);
    else ptsEl.textContent = e.pts;
    prevPts[e.tag] = e.pts;
    const bars = aliveEl.querySelectorAll(".alive-bar");
    bars.forEach((bar, bi) => bar.classList.toggle("active", bi < alive));
  }
}

db.ref("/matches/0_teams").on("value", snap => {
  teamsData = snap.val() || {};
  renderTicker();
});

db.ref("/matches/live").on("value", snap => {
  liveData = snap.val() || {};
  renderTicker();
});


// ── Points visibility ──────────────────────────────────────────────────────
db.ref("/live-graphics/status").on("value", snap => {
  const val = snap.val();
  const box    = document.querySelector(".ticker-box");
  const header = document.querySelector(".ticker-header");
  const hide = val !== "show";
  box.classList.toggle("pts-hidden", hide);
  header.classList.toggle("pts-hidden", hide);
});

// ── Entrance / exit direction ───────────────────────────────────────────
// /live-graphics/animate-from-to holds either "left" or "right".
//   "left"  -> left edge fixed; ticker wipes/reveals in growing rightward
//   "right" -> right edge fixed; ticker wipes/reveals in growing leftward
// NOTE: clip-path classes are applied to .ticker-row (inner), NOT .row-wrap.
// The glow filter on .row-wrap is therefore never clipped.
let animDirection = "left"; // "left" | "right"
let animState      = "out";  // "in" | "out"
let animTimers      = [];

function hideClassFor(direction) {
  return direction === "right" ? "anim-hide-right" : "anim-hide-left";
}

function applyAnim() {
  animTimers.forEach(t => clearTimeout(t));
  animTimers = [];

  const header = document.querySelector(".ticker-header");
  // Sort visible wrappers by on-screen position for correct stagger order
  const wrapRows = rowEls
    .filter(wrap => wrap.style.display !== "none")
    .slice()
    .sort((a, b) => (parseFloat(a.style.top) || 0) - (parseFloat(b.style.top) || 0));

  // Clip-path targets: header directly, inner .ticker-row for each wrap
  const headerTarget = header;
  const rowTargets   = wrapRows.map(wrap => innerRow(wrap));
  const allTargets   = [headerTarget, ...rowTargets];

  const isIn     = animState === "in";
  const hideCls  = hideClassFor(animDirection);
  const otherHideCls = hideCls === "anim-hide-left" ? "anim-hide-right" : "anim-hide-left";

  if (isIn) {
    allTargets.forEach(el => {
      el.style.transition = "none";
      el.classList.remove("anim-in", otherHideCls, hideCls);
      el.classList.add(hideCls);
    });
    void header.offsetHeight;
    allTargets.forEach(el => { el.style.transition = ""; });

    header.classList.remove("trans-anim-out");
    header.classList.add("trans-anim");
    header.classList.remove(hideCls);
    header.classList.add("anim-in");

    rowTargets.forEach((rowEl, i) => {
      const t = setTimeout(() => {
        rowEl.classList.remove("trans-anim-out");
        rowEl.classList.add("trans-anim");
        rowEl.classList.remove(hideCls);
        rowEl.classList.add("anim-in");
      }, 80 + i * 60);
      animTimers.push(t);
    });
  } else {
    rowTargets.forEach((rowEl, i) => {
      const t = setTimeout(() => {
        rowEl.classList.remove("trans-anim");
        rowEl.classList.add("trans-anim-out");
        rowEl.classList.remove("anim-in");
        rowEl.classList.add(hideCls);
      }, (rowTargets.length - 1 - i) * 60);
      animTimers.push(t);
    });
    const t = setTimeout(() => {
      header.classList.remove("trans-anim");
      header.classList.add("trans-anim-out");
      header.classList.remove("anim-in");
      header.classList.add(hideCls);
    }, rowTargets.length * 60 + 80);
    animTimers.push(t);
  }
}

db.ref("/live-graphics/animate-from-to").on("value", snap => {
  const val = (snap.val() || "left").toLowerCase().trim();
  animDirection = (val === "right") ? "right" : "left";
  if (animState === "in") applyAnim();
});

db.ref("/live-graphics/state").on("value", snap => {
  animState = (snap.val() || "out").toLowerCase();
  applyAnim();
});

// Initial hidden state
setTimeout(() => {
  animState = "out";
  applyAnim();
}, 0);
</script>
