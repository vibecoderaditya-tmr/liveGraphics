<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Overview</title>
    <link rel="icon" type="image/x-icon" href="/icon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --font-family: 'Lexend', Arial, sans-serif;
        --text-color: #e0e0e0;

        --logo-size: 100px;

        --overlay-color: rgba(0, 0, 0, 0.5);
        --map-blur: 3px;

        --bottom-gradient: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 55%);

        --ribbon-bg-booyah: #000000e1;
        --ribbon-bg-upcoming: #000000;
        --ribbon-width: fit-content;
        --ribbon-height: 55px;
        --ribbon-padding-x: 24px;
        --ribbon-skew: 10%;
        --ribbon-top: 0px;
        --ribbon-left: 0px;
        --label-font-family: var(--font-family);
        --label-font-size: 23px;
        --label-font-weight: 900;
        --label-letter-spacing: 2px;
        --label-color-booyah: #ffd700;
        --label-color-upcoming: #ffffff;
        --label-text-shadow: 0 1px 4px rgba(0,0,0,0.9);

        --badge-font-family: var(--font-family);
        --badge-font-size: 20px;
        --badge-font-weight: 800;
        --badge-letter-spacing: 1.5px;
        --badge-color: #ffffff;
        --badge-bg: #58412a;
        --badge-bg-image: none;
        --badge-width: 120px;
        --badge-height: 44px;
        --badge-top: 0px;
        --badge-right: 0px;

        --map-label-font-family: var(--font-family);
        --map-label-font-size: 23px;
        --map-label-font-weight: 700;
        --map-label-letter-spacing: 2px;
        --map-label-color: #000000;
        --map-label-bg: #c1a882;
        --map-label-bg-image: none;
        --map-label-width: 190px;
        --map-label-height: 44px;
        --map-label-skew: 7%;
        --map-label-right: 0px;
        --map-label-bottom: 0px;

        --box-height: 115px;
        --box-bg: #222;
        --box-border-radius: 6px;

        --grid-gap: 15px;
        --grid-padding: 10px;
        --grid-width: 25%;

        --standings-bg: #c1a882;
        --standings-border: #58412a;
        --standings-header-bg: #58412a;
        --standings-header-color: #ffffff;
        --standings-col-header-bg: #58412a;
        --standings-col-header-color: #ffffff;
        --standings-row-height: 60px;
        --standings-alt-row: #c1a882;
        --standings-text: #000000;
        --standings-text-dim: #000000;
        --standings-font-family: var(--font-family);

        /* ── Background box behind the team logo in the STANDINGS table only.
           Change --standings-logo-bg to whatever color/gradient you want.
           The map boxes (.team-logo) are untouched and stay background-free. */
        --standings-logo-bg: #58412a;
        --standings-logo-padding: 0px;
        --standings-logo-radius: 50%;
        --standings-logo-border: none;

        --slide-duration: 0.5s;
        --slide-stagger: 0.15s;
        --stay-duration: 15s;

        /*
         * Positive (+120px) → slides from RIGHT, exits RIGHT
         * Negative (-120px) → slides from LEFT,  exits LEFT
         */
        --slide-offset: -120px;

        --booyah-img-height: 135px;
        --booyah-img-top: -25px;
      }

      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        display: flex;
        align-items: flex-end;
        padding-bottom: 20px;
      }

      .main {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--grid-gap);
        padding: var(--grid-padding);
        width: var(--grid-width);
        border-radius: 8px;
      }

      /* ── Map boxes ── */
      .box {
        position: relative;
        width: 100%;
        height: var(--box-height);
        overflow: visible;
        clip-path: inset(0px);
        border-radius: var(--box-border-radius);
        background: var(--box-bg);
        opacity: 0;
        transform: translateX(var(--slide-offset));
      }
      .box img.map-img {
        width: 100%; height: 100%;
        object-fit: cover; object-position: center;
        display: block;
        border-radius: var(--box-border-radius);
        transition: filter 0.4s ease;
      }
      .box.has-tag img.map-img { filter: blur(var(--map-blur)); }
      .box .overlay {
        position: absolute; inset: 0;
        background: var(--overlay-color);
        display: none; z-index: 1;
        border-radius: var(--box-border-radius);
      }
      .box.has-tag .overlay { display: block; }
      .box .bottom-grad {
        position: absolute; inset: 0;
        background: var(--bottom-gradient);
        z-index: 2; pointer-events: none;
        border-radius: var(--box-border-radius);
      }
      /* Logo inside the MAP boxes — intentionally has NO background box */
      .team-logo {
        position: absolute;
        top: 5px; left: 20px;
        width: var(--logo-size); height: var(--logo-size);
        object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
        display: none; z-index: 3;
      }
      .team-logo.visible { display: block; }
      .booyah-img {
        position: absolute;
        top: var(--booyah-img-top);
        left: calc(14px + var(--logo-size) + 8px);
        height: var(--booyah-img-height); width: auto;
        object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
        display: none; z-index: 4;
      }
      .box.has-tag .team-logo.visible ~ .booyah-img { display: block; }
      .box .status-label {
        position: absolute;
        top: var(--ribbon-top); left: var(--ribbon-left);
        width: var(--ribbon-width); height: var(--ribbon-height);
        display: flex; align-items: center; justify-content: center;
        padding: 0 var(--ribbon-padding-x);
        font-family: var(--label-font-family);
        font-size: var(--label-font-size);
        font-weight: var(--label-font-weight);
        letter-spacing: var(--label-letter-spacing);
        text-shadow: var(--label-text-shadow);
        white-space: nowrap;
        clip-path: polygon(0% 0%, 100% 0%, calc(100% - var(--ribbon-skew)) 100%, 0% 100%);
        z-index: 6;
      }
      .box.has-tag .status-label     { color: var(--label-color-booyah);   background: var(--ribbon-bg-booyah);   display: none; }
      .box:not(.has-tag) .status-label { color: var(--label-color-upcoming); background: var(--ribbon-bg-upcoming); }
      .box .status-label:empty { display: none; }
      .box .game-badge {
        position: absolute;
        top: var(--badge-top); right: var(--badge-right);
        width: var(--badge-width); height: var(--badge-height);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--badge-font-family);
        font-size: var(--badge-font-size);
        font-weight: var(--badge-font-weight);
        letter-spacing: var(--badge-letter-spacing);
        color: var(--badge-color);
        background-color: var(--badge-bg);
        background-image: var(--badge-bg-image);
        background-size: 100% 100%; background-position: center;
        white-space: nowrap;
        clip-path: polygon(14% 10%, 93% 5%, 98% 91%, -21% 99%);
        z-index: 6;
      }
      .box span.map-label {
        position: absolute;
        bottom: var(--map-label-bottom); right: var(--map-label-right);
        width: var(--map-label-width); height: var(--map-label-height);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--map-label-font-family);
        font-size: var(--map-label-font-size);
        font-weight: var(--map-label-font-weight);
        letter-spacing: var(--map-label-letter-spacing);
        color: var(--map-label-color);
        background-color: var(--map-label-bg);
        background-image: var(--map-label-bg-image);
        background-size: 100% 100%; background-position: center;
        white-space: nowrap;
        clip-path: polygon(15% -20%, 90% -15%, 95% 90%, -10% 120%);
        z-index: 6;
      }

      /* ── Standings ── */
      .standings {
        position: relative;
        width: var(--grid-width);
        padding: var(--grid-padding);
        display: none;
        flex-direction: column;
        gap: 2px;
      }
      /* Title + col-header both animate — start hidden like rows */
      .standings-header {
        background: var(--standings-header-bg);
        border: 1px solid var(--standings-border);
        border-bottom: 2px solid var(--standings-header-color);
        padding: 10px 14px;
        text-align: center;
        font-family: var(--standings-font-family);
        font-size: 22px; font-weight: 900;
        letter-spacing: 3px;
        color: var(--standings-header-color);
        text-transform: uppercase;
        margin-bottom: 4px;
        border-radius: 6px 6px 0 0;
        opacity: 0;
        transform: translateX(var(--slide-offset));
      }
      .standings-col-header {
        display: flex; align-items: center;
        padding: 10px 14px;
        font-family: var(--standings-font-family);
        font-size: 14px; font-weight: 800;
        letter-spacing: 2px;
        color: var(--standings-col-header-color);
        text-transform: uppercase;
        background: var(--standings-col-header-bg);
        border: 1px solid var(--standings-border);
        border-radius: 4px;
        margin-bottom: 4px;
        opacity: 0;
        transform: translateX(var(--slide-offset));
      }
      .standings-col-header .sth-rank  { width: 40px; text-align: center; flex-shrink: 0; }
      .standings-col-header .sth-teams { flex: 1; padding: 0 10px; text-align: center; }
      .standings-col-header .sth-pts   { width: 60px; text-align: center; flex-shrink: 0; }
      .standings-body { display: flex; flex-direction: column; gap: 2px; }
      .standings-row {
        display: flex; align-items: center;
        padding: 0 14px;
        height: var(--standings-row-height);
        background: var(--standings-bg);
        border: 1px solid var(--standings-border);
        border-radius: 4px;
        font-family: var(--standings-font-family);
        font-size: 18px; color: var(--standings-text);
        opacity: 0;
        transform: translateX(var(--slide-offset));
      }
      .standings-row:nth-child(even) { background: var(--standings-alt-row); }
      .standings-rank { width: 40px; text-align: center; font-weight: 800; color: var(--standings-text-dim); flex-shrink: 0; }
      /* Logo inside the STANDINGS table — gets its own background box,
         fully controlled from :root (--standings-logo-bg / padding / radius) */
      .standings-logo {
        width: var(--standings-row-height);
        height: 100%;
        object-fit: contain;
        flex-shrink: 0;
        margin: 0 10px 0 20px;
        filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
        background-color: var(--standings-logo-bg);
        padding: var(--standings-logo-padding);
        border-radius: var(--standings-logo-radius);
        border: var(--standings-logo-border);
        box-sizing: border-box;
      }
      .standings-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px; font-size: 17px; font-weight: 700; letter-spacing: 1px; }
      .standings-pts  { width: 60px; text-align: center; font-weight: 700; flex-shrink: 0; }

      /* ── Debug panel ── */
      #debug {
        position: fixed; top: 10px; right: 10px;
        width: 420px;
        background: rgba(0,0,0,0.85); color: #0f0;
        font: 13px/1.5 monospace;
        padding: 12px 16px; border-radius: 8px;
        z-index: 999; white-space: pre-wrap; word-break: break-all;
      }
      #debug .err  { color: #f66; }
      #debug .warn { color: #fa0; }
      #debug .ok   { color: #0f0; }
      #debug h3 { color: #fff; margin-bottom: 6px; font-size: 14px; }
    </style>
  </head>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

    <script>
      // ─── Firebase ────────────────────────────────────────────────────────────
      firebase.initializeApp({
        apiKey:            "AIzaSyC21mdsgyIEqXT7ujFbi0xcVAMRZxxqB1I",

        messagingSenderId: "317037791388",

      });
      const fbDb = firebase.database();

      // ─── Constants ───────────────────────────────────────────────────────────
      const NUM_BOXES  = 8;
      const NUM_STANDS = 12;
      const POLL_MS    = 3000;

      /*
       * PATH HANDLING — works in two contexts:
       *
       * 1) Served over http(s) (Vercel, or a local dev server like
       *    `vercel dev` / `npx http-server` / `python -m http.server`):
       *    we use ABSOLUTE paths ("/logos/", "/maps/"). These resolve from
       *    the site root no matter which subfolder this HTML file lives in
       *    (e.g. /overlays/mapOverview.html still finds /logos/TAG.webp).
       *
       * 2) Opened directly as a file (double-clicked, file:///F:/...):
       *    absolute paths break because the browser treats "/" as the
       *    drive root, not a server root. In this case we fall back to a
       *    path RELATIVE to this HTML file's own location, so double-
       *    clicking the file works for a quick local check without needing
       *    a server running. Adjust ASSET_DIR below if your folder layout
       *    differs (see comment under it).
       */
      const isFileProtocol = location.protocol === "file:";

      // If opened via file://, build a base path relative to this HTML
      // file's own folder. This assumes logos/ and maps/ sit in the SAME
      // folder as this HTML file when testing locally via double-click.
      // If they don't, either move them next to this file for local
      // testing, or just run a local server instead (recommended) —
      // see chat for `vercel dev` / `http-server` instructions.
      function fileRelativeDir() {
        const path = location.pathname; // e.g. /F:/site/overlays/mapOverview.html
        return path.substring(0, path.lastIndexOf("/") + 1);
      }

      const LOGO_BASE = isFileProtocol ? `${fileRelativeDir()}logos/` : "/logos/";
      const MAP_BASE  = isFileProtocol ? `${fileRelativeDir()}maps/`  : "/maps/";
      const LOGO_EXT  = ".webp";

      /*
       * CASE-INSENSITIVE IMAGE LOADING
       * ───────────────────────────────
       * Vercel's filesystem (Linux) is case-sensitive, so "Bermuda.webp"
       * and "bermuda.webp" are different files to the server. To support
       * filenames saved in ANY case without renaming anything, we try a
       * short list of casing variants in order and fall through to the
       * next one on load failure, until one succeeds (or all fail).
       *
       * setImgWithCaseFallback(imgEl, base, name, ext)
       *   - imgEl: the <img> element to set
       *   - base:  folder path, e.g. MAP_BASE or LOGO_BASE
       *   - name:  filename WITHOUT extension, in its natural/lowercase form
       *   - ext:   extension including the dot, e.g. ".webp"
       */
      function buildCaseVariants(name) {
        // Defensive: strip leading/trailing whitespace and any character
        // that isn't a letter/number/underscore/hyphen, in case Firebase
        // ever returns a tag with stray whitespace or invisible characters
        const clean = String(name).trim().replace(/[^a-zA-Z0-9_-]/g, "");
        const lower = clean.toLowerCase();
        const upper = clean.toUpperCase();
        // Capitalized (first letter upper, rest lower) as a 3rd common case
        const capitalized = lower.charAt(0).toUpperCase() + lower.slice(1);
        // De-duplicate while preserving order: try lower, upper, capitalized
        return [...new Set([lower, upper, capitalized])];
      }

      function setImgWithCaseFallback(imgEl, base, name, ext) {
        const variants = buildCaseVariants(name);
        let attempt = 0;

        function tryNext() {
          if (attempt >= variants.length) {
            console.warn(`Image not found in any case variant: ${base}${name}${ext}`);
            imgEl.onerror = null;
            return;
          }
          const candidate = `${base}${variants[attempt]}${ext}`;
          attempt++;
          imgEl.onerror = tryNext;
          imgEl.src = candidate;
        }
        tryNext();
      }

      const FIXED_MAPS = [
        { name: "BERMUDA",   file: "bermuda"   },
        { name: "PURGATORY", file: "purgatory" },
        { name: "KALAHARI",  file: "kalahari"  },
        { name: "NEXTERRA",  file: "nexterra"  },
        { name: "SOLARA",    file: "solara"    },
      ];

      // Pick once on page load and keep fixed for the session
      const RANDOM_MAP_DEF = FIXED_MAPS[Math.floor(Math.random() * FIXED_MAPS.length)];
      const RANDOM_MAP = { name: RANDOM_MAP_DEF.name, file: RANDOM_MAP_DEF.file };

      // Initial map assignment per box (mirrors the original hardcoded markup)
      const INITIAL_MAPS = [
        { file: "bermuda",   label: "BERMUDA"   },
        { file: "purgatory", label: "PURGATORY" },
        { file: "kalahari",  label: "KALAHARI"  },
        { file: "nexterra",  label: "NEXTERRA"  },
        { file: "solara",    label: "SOLARA"    },
        { file: "random",    label: "RANDOM"    },
        { file: "random",    label: "RANDOM"    },
        { file: "random",    label: "RANDOM"    },
      ];

      // ─── DOM refs ────────────────────────────────────────────────────────────
      const allBoxes    = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`box${i+1}`));
      const logos       = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`logo${i+1}`));
      const labels      = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`label${i+1}`));
      const mapImgs     = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`mapimg${i+1}`));
      const mapLabels   = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`maplabel${i+1}`));
      const booyahImgs  = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`booyahimg${i+1}`));

      const mainEl        = document.querySelector(".main");
      const standingsEl   = document.getElementById("standings");
      const standingsBody = document.getElementById("standings-body");
      const standTitleEl  = document.getElementById("standings-title");
      const standColEl    = document.getElementById("standings-col-header");

      // Set initial map images/labels/booyah-img sources from JS so they
      // respect LOGO_BASE/MAP_BASE regardless of protocol, and try
      // case variants until one loads successfully
      INITIAL_MAPS.forEach((m, i) => {
        setImgWithCaseFallback(mapImgs[i], MAP_BASE, m.file, LOGO_EXT);
        mapLabels[i].textContent = m.label;
        setImgWithCaseFallback(booyahImgs[i], MAP_BASE, "booyah", LOGO_EXT);
      });

      // ─── CSS animation values ────────────────────────────────────────────────
      const cssVars      = getComputedStyle(document.documentElement);
      const parseSec     = v => parseFloat(v.trim().replace('s','')) * 1000;
      const SLIDE_DUR    = parseSec(cssVars.getPropertyValue('--slide-duration'));
      const STAGGER      = parseSec(cssVars.getPropertyValue('--slide-stagger'));
      const STAY_DUR     = parseSec(cssVars.getPropertyValue('--stay-duration'));
      let slideOffset = cssVars.getPropertyValue('--slide-offset').trim();

      // Total slideable standings elements: title + col-header + NUM_STANDS rows
      const STAND_COUNT = 2 + NUM_STANDS;

      // ─── Build standings rows ────────────────────────────────────────────────
      let standingsRows = [];
      (function buildRows() {
        standingsBody.innerHTML = "";
        standingsRows = [];
        for (let i = 0; i < NUM_STANDS; i++) {
          const row = document.createElement("div");
          row.className = "standings-row";
          row.id = "srow-" + i;
          row.innerHTML =
            `<span class="standings-rank">#${i+1}</span>` +
            `<img class="standings-logo" id="slogo-${i}" src="" alt="">` +
            `<span class="standings-name" id="sname-${i}">—</span>` +
            `<span class="standings-pts"  id="spts-${i}">0</span>`;
          standingsBody.appendChild(row);
          standingsRows.push(row);
        }
      })();

      // ─── Firebase: standings from /matches/0_teams ───────────────────────────
      function fetchStandings() {
        fbDb.ref("/matches/0_teams").once("value", snap => {
          const teams = snap.val();
          if (!teams) return;
          const entries = Object.keys(teams).map(tag => ({
            tag,
            name:     teams[tag]["1_teamName"] || tag,
            totalPts: parseInt(teams[tag]["5_totalPoints"]) || 0
          }));
          entries.sort((a, b) => b.totalPts - a.totalPts);

          for (let i = 0; i < NUM_STANDS; i++) {
            const rankEl = document.querySelector(`#srow-${i} .standings-rank`);
            const logoEl = document.getElementById(`slogo-${i}`);
            const nameEl = document.getElementById(`sname-${i}`);
            const ptsEl  = document.getElementById(`spts-${i}`);

            if (i < entries.length) {
              const e = entries[i];
              if (rankEl) rankEl.textContent = `#${i+1}`;
              if (logoEl) {
                logoEl.style.display = "block";
                loadStandingsLogoCaseInsensitive(logoEl, e.tag);
              }
              if (nameEl) nameEl.textContent = e.name;
              if (ptsEl)  ptsEl.textContent  = e.totalPts;
            } else {
              if (rankEl) rankEl.textContent = "";
              if (logoEl) logoEl.style.display = "none";
              if (nameEl) nameEl.textContent = "—";
              if (ptsEl)  ptsEl.textContent  = "";
            }
          }
        });
      }
      fetchStandings();
      setInterval(fetchStandings, 5000);

      // ─── Slide direction ──────────────────────────────────────────────────────
      fbDb.ref("/live-graphics/overview/slideDirection").on("value", snap => {
        const dir = snap.val();
        const root = document.documentElement;
        if (dir === "right") {
          root.style.setProperty("--slide-offset", "120px");
          slideOffset = "120px";
        } else {
          root.style.setProperty("--slide-offset", "-120px");
          slideOffset = "-120px";
        }
      });

      // ─── Firebase: BOOYAH tags + maps for boxes 6-8 from matches ────────────
      let booyahTags = new Array(NUM_BOXES).fill(null);

      function attachBooyahListener() {
        fbDb.ref("/matches").on("value", snap => {
          const matches = snap.val() || {};
          const newTags = new Array(NUM_BOXES).fill(null);

          for (let i = 1; i <= NUM_BOXES; i++) {
            const matchNode = matches[`match${i}`];
            if (matchNode && matchNode["4_BOOYAH"] && matchNode["4_BOOYAH"]["tag"]) {
              newTags[i - 1] = matchNode["4_BOOYAH"]["tag"];
            }
            // boxes 6-8: read map name from Firebase (0-indexed: 5,6,7)
            if (i >= 6 && matchNode && matchNode["1_mapName"]) {
              const mapName = matchNode["1_mapName"];
              const file = mapName.toLowerCase();
              setImgWithCaseFallback(mapImgs[i - 1], MAP_BASE, file, LOGO_EXT);
              mapLabels[i - 1].textContent = mapName;
            }
          }

          booyahTags = newTags;
          applyBooyahToBoxes(booyahTags);
          logDebug();
        });
      }

      // ─── Apply BOOYAH tags to the 8 boxes ───────────────────────────────────
      function applyBooyahToBoxes(tags) {
        let firstEmptySeen = false;

        for (let i = 0; i < NUM_BOXES; i++) {
          const tag = tags[i];

          if (tag) {
            // ── Completed game: BOOYAH + team logo ──────────────────────────
            allBoxes[i].classList.add("has-tag");
            labels[i].innerHTML = `<span class="upcoming-text">BOOYAH</span>`;

            // Use the raw tag (not forced to one case) as the cache key so we
            // don't re-trigger the fallback chain on every poll for the same team
            if (logos[i].getAttribute("data-tag") !== tag) {
              logos[i].setAttribute("data-tag", tag);
              loadTeamLogoCaseInsensitive(logos[i], tag);
            }

          } else {
            // ── Empty slot ───────────────────────────────────────────────────
            allBoxes[i].classList.remove("has-tag");
            logos[i].onload  = null;
            logos[i].onerror = null;
            logos[i].src     = "";
            logos[i].setAttribute("data-tag", "");
            logos[i].classList.remove("visible");

            if (!firstEmptySeen) {
              firstEmptySeen = true;
              labels[i].innerHTML = `<span class="upcoming-text">COMING AHEAD</span>`;
              // Only set random map for boxes 6-8 if Firebase hasn't provided one yet
              if (i >= 5 && mapLabels[i].textContent === "RANDOM") {
                setImgWithCaseFallback(mapImgs[i], MAP_BASE, RANDOM_MAP.file, LOGO_EXT);
                mapLabels[i].textContent = RANDOM_MAP.name;
              }
            } else {
              labels[i].innerHTML = `<span class="upcoming-text">UPCOMING</span>`;
            }
          }
        }
      }

      // Loads a standings-row team logo trying multiple case variants of the
      // tag; hides the <img> only if every variant fails to load
      function loadStandingsLogoCaseInsensitive(imgEl, tag) {
        const variants = buildCaseVariants(tag);
        let attempt = 0;

        function tryNext() {
          if (attempt >= variants.length) {
            imgEl.style.display = "none";
            imgEl.onerror = null;
            return;
          }
          const candidate = `${LOGO_BASE}${variants[attempt]}${LOGO_EXT}`;
          attempt++;
          imgEl.onerror = tryNext;
          imgEl.src = candidate;
        }
        tryNext();
      }

      // Loads a team logo trying multiple case variants of the tag, and
      // toggles the .visible class on success/failure like the original code did
      function loadTeamLogoCaseInsensitive(imgEl, tag) {
        const variants = buildCaseVariants(tag);
        let attempt = 0;
        console.log(`[logo] starting fallback chain for tag="${tag}" variants=${JSON.stringify(variants)}`);

        function tryNext() {
          if (attempt >= variants.length) {
            imgEl.classList.remove("visible");
            console.warn(`[logo] ALL variants failed for tag="${tag}"`);
            imgEl.onerror = null;
            return;
          }
          const candidate = `${LOGO_BASE}${variants[attempt]}${LOGO_EXT}`;
          console.log(`[logo] attempt ${attempt + 1}/${variants.length} for tag="${tag}": ${candidate}`);
          attempt++;
          imgEl.onload = () => {
            console.log(`[logo] SUCCESS: ${candidate}`);
            imgEl.classList.add("visible");
          };
          imgEl.onerror = () => {
            console.warn(`[logo] FAILED: ${candidate} — trying next variant`);
            tryNext();
          };
          imgEl.src = candidate;
        }
        tryNext();
      }


      // ─── Debug panel ────────────────────────────────────────────────────────
      const showDebug = !location.search.includes("nodebug");
      if (!showDebug) document.getElementById("debug").style.display = "none";
      const dbEl = document.getElementById("debug-body");

      function logDebug() {
        if (!showDebug) return;
        const lines = [
          `⏱ ${new Date().toLocaleTimeString()}`,
          `Protocol: ${location.protocol} ${isFileProtocol ? "(file-relative paths in use)" : "(absolute paths in use)"}`,
          `Logo base: ${LOGO_BASE}`,
          `Map base: ${MAP_BASE}`,
          `Random map: ${RANDOM_MAP.name}`,
          ``
        ];
        booyahTags.forEach((tag, i) => {
          if (tag) {
            lines.push(`✅ GAME ${i+1}: BOOYAH → ${tag}`);
          } else if (i === booyahTags.findIndex(t => !t)) {
            lines.push(`⚠️ GAME ${i+1}: COMING AHEAD`);
          } else {
            lines.push(`   GAME ${i+1}: UPCOMING`);
          }
        });
        dbEl.innerHTML = lines.map(l => {
          if (l.startsWith("❌")) return `<span class="err">${l}</span>`;
          if (l.startsWith("⚠️")) return `<span class="warn">${l}</span>`;
          if (l.startsWith("✅")) return `<span class="ok">${l}</span>`;
          return l;
        }).join("\n");
      }

      // ─── Slide helpers ───────────────────────────────────────────────────────
      function resetEl(el) {
        el.style.transition = 'none';
        el.style.opacity    = '0';
        el.style.transform  = `translateX(${slideOffset})`;
      }

      function slideEl(el, inOrOut, delay) {
        setTimeout(() => {
          el.style.transition = `opacity ${SLIDE_DUR}ms ease, transform ${SLIDE_DUR}ms ease`;
          el.style.opacity    = inOrOut === 'in' ? '1' : '0';
          el.style.transform  = inOrOut === 'in' ? 'translateX(0)' : `translateX(${slideOffset})`;
        }, delay);
      }

      // Slide all standings elements (title → col-header → rows, or reverse)
      function slideStandings(inOrOut) {
        const els = [standTitleEl, standColEl, ...standingsRows];
        if (inOrOut === 'in') {
          els.forEach((el, i) => slideEl(el, 'in', i * STAGGER));
        } else {
          [...els].reverse().forEach((el, i) => slideEl(el, 'out', i * STAGGER));
        }
      }

      function resetStandings() {
        [standTitleEl, standColEl, ...standingsRows].forEach(el => resetEl(el));
      }

      // ─── Main animation cycle ────────────────────────────────────────────────
      function runCycle() {
        // ── Phase 1: Maps slide in ───────────────────────────────────────────
        standingsEl.style.display = "none";
        mainEl.style.display      = "grid";
        allBoxes.forEach(box => resetEl(box));

        // 50ms grace for browser to process the instant reset
        setTimeout(() => {
          allBoxes.forEach((box, i) => slideEl(box, 'in', i * STAGGER));
        }, 50);

        const mapsInDone = 50 + NUM_BOXES * STAGGER + SLIDE_DUR;
        const mapsOutAt  = mapsInDone + STAY_DUR;

        // ── Phase 2: Maps slide out (reverse) ───────────────────────────────
        setTimeout(() => {
          for (let i = 0; i < NUM_BOXES; i++) {
            slideEl(allBoxes[NUM_BOXES - 1 - i], 'out', i * STAGGER);
          }
        }, mapsOutAt);

        const mapsClearAt = mapsOutAt + NUM_BOXES * STAGGER + SLIDE_DUR;

        // ── Phase 3: Standings slide in ──────────────────────────────────────
        setTimeout(() => {
          mainEl.style.display      = "none";
          standingsEl.style.display = "flex";
          resetStandings();
          setTimeout(() => slideStandings('in'), 50);
        }, mapsClearAt);

        const standsInDone = mapsClearAt + 50 + STAND_COUNT * STAGGER + SLIDE_DUR;
        const standsOutAt  = standsInDone + STAY_DUR;

        // ── Phase 4: Standings slide out (reverse) ───────────────────────────
        setTimeout(() => slideStandings('out'), standsOutAt);

        const standsClearAt = standsOutAt + STAND_COUNT * STAGGER + SLIDE_DUR;

        // ── Phase 5: Loop ────────────────────────────────────────────────────
        setTimeout(() => runCycle(), standsClearAt);
      }

      // ─── Boot ────────────────────────────────────────────────────────────────
      attachBooyahListener();
      runCycle();
    </script>
  </body>
</html>
