<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Overview</title>
	<link rel="icon" type="image/x-icon" href="icon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        /* ── Global theme ── */
        --font-family: 'Lexend', Arial, sans-serif;
        --bg-color: transparent;
        --text-color: #e0e0e0;

        /* ── Logo ── */
        --logo-size: 100px;

        /* ── Overlay (shown on BOOYAH boxes) ── */
        --overlay-color: rgba(0, 0, 0, 0.5);
        --map-blur: 3px;

        /* ── Bottom gradient (always shown on every box) ── */
        --bottom-gradient: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.75) 0%,
          rgba(0, 0, 0, 0) 55%
        );

        /* ── Ribbon (BOOYAH / UPCOMING) — top left of each box ── */
        --ribbon-bg-booyah: #000000e1;
        --ribbon-bg-upcoming: #000000;
        --ribbon-width: fit-content;
        --ribbon-height: 55px;
        --ribbon-padding-x: 24px;
        --ribbon-skew: 10%;
        --ribbon-top: 0px;
        --ribbon-left: 0px;
        --label-font-family: var(--font-family);
        --label-font-size: 23px;
        --label-font-weight: 900;
        --label-letter-spacing: 2px;
        --label-color-booyah: #ffd700;
        --label-color-upcoming: #ffffff;
        --label-text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);

        /* ── Game Badge — top right of each box ── */
        --badge-font-family: var(--font-family);
        --badge-font-size: 20px;
        --badge-font-weight: 800;
        --badge-letter-spacing: 1.5px;
        --badge-color: #ffffff;
        --badge-bg: #58412a;
        --badge-bg-image: none;
        --badge-width: 120px;
        --badge-height: 44px;
        --badge-skew: 12%;
        --badge-top: 0px;
        --badge-right: 0px;

        /* ── Map Label — bottom right of each box ── */
        --map-label-font-family: var(--font-family);
        --map-label-font-size: 23px;
        --map-label-font-weight: 700;
        --map-label-letter-spacing: 2px;
        --map-label-color: #000000;
        --map-label-bg: #c1a882;
        --map-label-bg-image: none;
        --map-label-width: 190px;
        --map-label-height: 44px;
        --map-label-skew: 7%;
        --map-label-right: 0px;
        --map-label-bottom: 0px;

        /* ── Box ── */
        --box-height: 115px;
        --box-bg: #222;
        --box-border-radius: 6px;

        /* ── Layout ── */
        --grid-gap: 15px;
        --grid-padding: 10px;
        --grid-width: 25%;

        /* ── Standings table ── */
        --standings-bg: #1a1a1a;
        --standings-border: #333;
        --standings-header-bg: #222;
        --standings-header-color: #ffd700;
        --standings-col-header-bg: #2a2a2a;
        --standings-row-height: 60px;
        --standings-alt-row: #1e1e1e;
        --standings-text: var(--text-color);
        --standings-text-dim: #888;
        --standings-font-family: var(--font-family);

        /* ── Animation timing ── */
        --slide-duration: 0.5s;
        --slide-stagger: 0.15s;
        --stay-duration: 15s;
        --hide-duration: 15s;

        /*
         * ── Slide offset ──
         * Controls WHERE boxes come FROM and go TO during animation.
         * Positive value  (+120px) → slides in from the RIGHT, exits to the RIGHT
         * Negative value  (-120px) → slides in from the LEFT,  exits to the LEFT
         */
        --slide-offset: -120px;

        /* ── Booyah image (right of team logo) ── */
        --booyah-img-height: 135px;
        --booyah-img-top: -25px;
      }

      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        display: flex;
        align-items: flex-end;
		padding-bottom: 20px;
      }

      .main {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--grid-gap);
        padding: var(--grid-padding);
        width: var(--grid-width);
        border-radius: 8px;
      }

      .box {
        position: relative;
        width: 100%;
        height: var(--box-height);
        overflow: visible;
        clip-path: inset(0px);
        border-radius: var(--box-border-radius);
        background: var(--box-bg);
        /* start fully invisible, offset by --slide-offset */
        opacity: 0;
        transform: translateX(var(--slide-offset));
      }

      .box img.map-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
        border-radius: var(--box-border-radius);
        transition: filter 0.4s ease;
      }
      .box.has-tag img.map-img {
        filter: blur(var(--map-blur));
      }

      /* Dark overlay — only on BOOYAH boxes */
      .box .overlay {
        position: absolute;
        inset: 0;
        background: var(--overlay-color);
        display: none;
        z-index: 1;
        border-radius: var(--box-border-radius);
      }
      .box.has-tag .overlay {
        display: block;
      }

      /* Bottom gradient — always on every box */
      .box .bottom-grad {
        position: absolute;
        inset: 0;
        background: var(--bottom-gradient);
        z-index: 2;
        pointer-events: none;
        border-radius: var(--box-border-radius);
      }

      /* ── Team logo ── */
      .team-logo {
        position: absolute;
        top: 5px;
        left: 20px;
        width: var(--logo-size);
        height: var(--logo-size);
        object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.7));
        display: none;
        z-index: 3;
      }
      .team-logo.visible {
        display: block;
      }

      /* ── Booyah image — right of team logo, only on BOOYAH boxes ── */
      .booyah-img {
        position: absolute;
        top: var(--booyah-img-top);
        /* sits right after the logo: logo left(14px) + logo-size(150px) + small gap(8px) */
        left: calc(14px + var(--logo-size) + 8px);
        height: var(--booyah-img-height);
        width: auto;
        object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.7));
        display: none;
        z-index: 4;
      }
      /* Only show when the box has the BOOYAH tag AND the team logo is visible */
      .box.has-tag .team-logo.visible ~ .booyah-img {
        display: block;
      }

      /* ── BOOYAH / UPCOMING ribbon — top left ── */
      .box .status-label {
        position: absolute;
        top: var(--ribbon-top);
        left: var(--ribbon-left);
        width: var(--ribbon-width);
        height: var(--ribbon-height);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 var(--ribbon-padding-x);
        font-family: var(--label-font-family);
        font-size: var(--label-font-size);
        font-weight: var(--label-font-weight);
        letter-spacing: var(--label-letter-spacing);
        text-shadow: var(--label-text-shadow);
        white-space: nowrap;
        clip-path: polygon(
          0% 0%,
          100% 0%,
          calc(100% - var(--ribbon-skew)) 100%,
          0% 100%
        );
        z-index: 6;
      }
      .box.has-tag .status-label {
        color: var(--label-color-booyah);
        background: var(--ribbon-bg-booyah);
      }
      .box:not(.has-tag) .status-label {
        color: var(--label-color-upcoming);
        background: var(--ribbon-bg-upcoming);
      }
      .box .status-label:empty {
        display: none;
      }
      .box.has-tag .status-label {
        display: none;
      }

      /* ── GAME N badge — top right ── */
      .box .game-badge {
        position: absolute;
        top: var(--badge-top);
        right: var(--badge-right);
        width: var(--badge-width);
        height: var(--badge-height);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--badge-font-family);
        font-size: var(--badge-font-size);
        font-weight: var(--badge-font-weight);
        letter-spacing: var(--badge-letter-spacing);
        color: var(--badge-color);
        background-color: var(--badge-bg);
        background-image: var(--badge-bg-image);
        background-size: 100% 100%;
        background-position: center;
        white-space: nowrap;
        clip-path: polygon(
          14% 10%,
          93% 5%,
          98% 91%,
          -21% 99%
        );
        z-index: 6;
      }

      /* ── Map label — bottom right ── */
      .box span.map-label {
        position: absolute;
        bottom: var(--map-label-bottom);
        right: var(--map-label-right);
        width: var(--map-label-width);
        height: var(--map-label-height);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--map-label-font-family);
        font-size: var(--map-label-font-size);
        font-weight: var(--map-label-font-weight);
        letter-spacing: var(--map-label-letter-spacing);
        color: var(--map-label-color);
        background-color: var(--map-label-bg);
        background-image: var(--map-label-bg-image);
        background-size: 100% 100%;
        background-position: center;
        white-space: nowrap;
        clip-path: polygon(
          15% -20%,
          90% -15%,
          95% 90%,
          -10% 120%
        );
        z-index: 6;
      }

      /* ── Standings table — rows slide in/out with stagger, same as boxes ── */
      .standings {
        position: relative;
        width: var(--grid-width);
        padding: var(--grid-padding);
        display: none;
        flex-direction: column;
        gap: 2px;
      }
      .standings.visible {
        display: flex;
      }
      .standings-header {
        background: var(--standings-header-bg);
        border: 1px solid var(--standings-border);
        border-bottom: 2px solid var(--standings-header-color);
        padding: 10px 14px;
        text-align: center;
        font-family: var(--standings-font-family);
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 3px;
        color: var(--standings-header-color);
        text-transform: uppercase;
        margin-bottom: 4px;
        border-radius: 6px 6px 0 0;
        /* header doesn't slide — always visible with the container */
      }
      .standings-col-header {
        display: flex;
        align-items: center;
        padding: 10px 14px;
        font-family: var(--standings-font-family);
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 2px;
        color: var(--standings-text-dim);
        text-transform: uppercase;
        background: var(--standings-col-header-bg);
        border: 1px solid var(--standings-border);
        border-radius: 4px;
        margin-bottom: 4px;
      }
      .standings-col-header .sth-rank {
        width: 40px;
        text-align: center;
        flex-shrink: 0;
      }
      .standings-col-header .sth-teams {
        flex: 1;
        padding: 0 10px;
        text-align: center;
      }
      .standings-col-header .sth-pts {
        width: 60px;
        text-align: center;
        flex-shrink: 0;
      }
      .standings-body {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .standings-row {
        display: flex;
        align-items: center;
        padding: 0 14px;
        height: var(--standings-row-height);
        background: var(--standings-bg);
        border: 1px solid var(--standings-border);
        border-radius: 4px;
        font-family: var(--standings-font-family);
        font-size: 18px;
        color: var(--standings-text);
        /* start invisible, offset by slide-offset (same as .box) */
        opacity: 0;
        transform: translateX(var(--slide-offset));
      }
      .standings-row:nth-child(even) {
        background: var(--standings-alt-row);
      }
      .standings-rank {
        width: 40px;
        text-align: center;
        font-weight: 800;
        color: var(--standings-text-dim);
        flex-shrink: 0;
      }
      .standings-logo {
        width: 42px;
        height: 42px;
        object-fit: contain;
        flex-shrink: 0;
        margin: 0 10px 0 20px;
        filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
      }
      .standings-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 0 4px;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .standings-pts {
        width: 60px;
        text-align: center;
        font-weight: 700;
        color: var(--standings-text);
        flex-shrink: 0;
      }

      /* ── DEBUG PANEL ── */
      #debug {
        position: fixed;
        top: 10px;
        right: 10px;
        width: 420px;
        background: rgba(0, 0, 0, 0.85);
        color: #0f0;
        font: 13px/1.5 monospace;
        padding: 12px 16px;
        border-radius: 8px;
        z-index: 999;
        white-space: pre-wrap;
        word-break: break-all;
      }
      #debug .err  { color: #f66; }
      #debug .warn { color: #fa0; }
      #debug .ok   { color: #0f0; }
      #debug h3 { color: #fff; margin-bottom: 6px; font-size: 14px; }
    </style>
  </head>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
      // ─── Firebase init ───────────────────────────────────────────────────────
      firebase.initializeApp({
        apiKey:            "AIzaSyC21mdsgyIEqXT7ujFbi0xcVAMRZxxqB1I",
        authDomain:        "tmraditya-1ceb7.firebaseapp.com",
        databaseURL:       "https://tmraditya-1ceb7-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:         "tmraditya-1ceb7",
        storageBucket:     "tmraditya-1ceb7.firebasestorage.app",
        messagingSenderId: "317037791388",
        appId:             "1:317037791388:web:755b5a18bb77aa140a4559"
      });
      var fbDb = firebase.database();

      // ─── Standings data fetcher (from matches/0_teams) ─────────────────────
      var LOGO_FOLDER = "logos";
      var LOGO_EXT    = ".webp";

      function fetchStandings() {
        fbDb.ref("/matches/0_teams").once("value", function(snap) {
          var teams = snap.val();
          if (!teams) return;

          var entries = Object.keys(teams).map(function(tag) {
            var t = teams[tag];
            return {
              tag:      tag,
              name:     t["1_teamName"] || tag,
              rank:     parseInt(t["0_rank"]) || 99,
              totalPts: parseInt(t["5_totalPoints"]) || 0
            };
          });

          entries.sort(function(a, b) { return b.totalPts - a.totalPts; });

          for (var i = 0; i < 12; i++) {
            var row = document.getElementById("srow-" + i);
            if (!row) continue;

            var rankEl  = row.querySelector(".standings-rank");
            var logoEl  = document.getElementById("slogo-" + i);
            var nameEl  = document.getElementById("sname-" + i);
            var ptsEl   = document.getElementById("spts-" + i);

            if (i < entries.length) {
              var e = entries[i];
              if (rankEl) rankEl.textContent = "#" + (i + 1);
              if (logoEl) {
                logoEl.src = LOGO_FOLDER + "/" + e.tag + LOGO_EXT;
                logoEl.onerror = function() { this.style.display = "none"; };
                logoEl.style.display = "block";
              }
              if (nameEl) nameEl.textContent = e.name;
              if (ptsEl)  ptsEl.textContent  = e.totalPts;
            } else {
              if (rankEl) rankEl.textContent = "";
              if (logoEl) logoEl.style.display = "none";
              if (nameEl) nameEl.textContent = "—";
              if (ptsEl)  ptsEl.textContent  = "";
            }
          }
        });
      }

      // fetch immediately then every 5s
      fetchStandings();
      setInterval(fetchStandings, 5000);

      // ─── Random map for box 6 — picked once on load, fixed until page reload ───
      const FIXED_MAPS = [
        { name: "BERMUDA",   img: "maps/bermuda.webp"   },
        { name: "PURGATORY", img: "maps/purgatory.webp" },
        { name: "KALAHARI",  img: "maps/kalahari.webp"  },
        { name: "NEXTERRA",  img: "maps/nexterra.webp"  },
        { name: "SOLARA",    img: "maps/solara.webp"    },
      ];
      const RANDOM_MAP = FIXED_MAPS[Math.floor(Math.random() * FIXED_MAPS.length)];

      // ─── Animation config — reads from CSS :root vars ───────────────────────
      const style       = getComputedStyle(document.documentElement);
      const parseSec    = v => parseFloat(v.trim().replace('s','')) * 1000;
      const SLIDE_DUR   = parseSec(style.getPropertyValue('--slide-duration'));
      const STAGGER     = parseSec(style.getPropertyValue('--slide-stagger'));
      const STAY_DUR    = parseSec(style.getPropertyValue('--stay-duration'));
      const HIDE_DUR    = parseSec(style.getPropertyValue('--hide-duration'));

      // Read --slide-offset from :root (e.g. "-120px" or "120px")
      // This controls the slide direction: negative = from left, positive = from right
      const SLIDE_OFFSET = style.getPropertyValue('--slide-offset').trim();

      const NUM_BOXES   = 8;
      const allBoxes    = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`box${i + 1}`));

      // ─── Standings table (12 rows, each slides like a box) ─────────────────
      const standingsEl  = document.getElementById("standings");
      const standingsBody = document.getElementById("standings-body");
      let standingsRows = [];

      function buildStandingsRows() {
        standingsBody.innerHTML = "";
        standingsRows = [];
        for (let i = 0; i < 12; i++) {
          const row = document.createElement("div");
          row.className = "standings-row";
          row.id = "srow-" + i;
          row.innerHTML =
            '<span class="standings-rank">#' + (i + 1) + '</span>' +
            '<img class="standings-logo" id="slogo-' + i + '" src="" alt="">' +
            '<span class="standings-name" id="sname-' + i + '">—</span>' +
            '<span class="standings-pts" id="spts-' + i + '">0</span>';
          standingsBody.appendChild(row);
          standingsRows.push(row);
        }
      }
      buildStandingsRows();

      // Slide a single standings row in or out (same as slideBox for maps)
      function slideStandingsRow(row, inOrOut, delay) {
        setTimeout(() => {
          row.style.transition = `opacity ${SLIDE_DUR}ms ease, transform ${SLIDE_DUR}ms ease`;
          if (inOrOut === 'in') {
            row.style.opacity = '1';
            row.style.transform = 'translateX(0)';
          } else {
            row.style.opacity = '0';
            row.style.transform = `translateX(${SLIDE_OFFSET})`;
          }
        }, delay);
      }

      function slideStandingsIn() {
        standingsEl.style.display = "flex";
        standingsRows.forEach((row, i) => {
          slideStandingsRow(row, 'in', i * STAGGER);
        });
      }

      function slideStandingsOut() {
        standingsRows.forEach((row, i) => {
          const reverseIndex = standingsRows.length - 1 - i;
          slideStandingsRow(standingsRows[reverseIndex], 'out', i * STAGGER);
        });
      }

      // Slide a single box in (opacity 1, translateX 0) or out (opacity 0, translateX = SLIDE_OFFSET)
      function slideBox(box, inOrOut, delay) {
        setTimeout(() => {
          box.style.transition = `opacity ${SLIDE_DUR}ms ease, transform ${SLIDE_DUR}ms ease`;
          if (inOrOut === 'in') {
            box.style.opacity = '1';
            box.style.transform = 'translateX(0)';
          } else {
            box.style.opacity = '0';
            box.style.transform = `translateX(${SLIDE_OFFSET})`;
          }
        }, delay);
      }

      // Slide all boxes IN — box 1 first, box 8 last
      function slideAllIn() {
        allBoxes.forEach((box, i) => {
          slideBox(box, 'in', i * STAGGER);
        });
      }

      // Slide all boxes OUT — box 8 first, box 1 last (reverse order)
      function slideAllOut() {
        allBoxes.forEach((box, i) => {
          const reverseIndex = NUM_BOXES - 1 - i;
          slideBox(allBoxes[reverseIndex], 'out', i * STAGGER);
        });
      }

      // Full cycle: maps in → stay → out → standings in → stay → out → repeat
      function runCycle() {
        slideAllIn();

        const mapsInTime  = NUM_BOXES * STAGGER + SLIDE_DUR;
        const mapsOutTime = mapsInTime + STAY_DUR;

        setTimeout(() => {
          slideAllOut();
        }, mapsOutTime);

        const mapsDone = mapsOutTime + NUM_BOXES * STAGGER + SLIDE_DUR;

        // clear maps display after they slide out
        setTimeout(() => {
          document.querySelector(".main").style.display = "none";
        }, mapsDone);

        // standings slide in after maps are fully out
        const NUM_STANDINGS = 12;
        const standsInAt = mapsDone;
        setTimeout(() => {
          slideStandingsIn();
        }, standsInAt);

        const standsInTime  = standsInAt + NUM_STANDINGS * STAGGER + SLIDE_DUR;
        const standsOutTime = standsInTime + STAY_DUR;

        setTimeout(() => {
          slideStandingsOut();
        }, standsOutTime);

        const standsDone = standsOutTime + NUM_STANDINGS * STAGGER + SLIDE_DUR + HIDE_DUR;

        setTimeout(() => {
          standingsEl.style.display = "none";
          document.querySelector(".main").style.display = "grid";
          runCycle();
        }, standsDone);
      }

      // ─── Firebase fetch ──────────────────────────────────────────────────────
      const WEB_APP_URL  = "https://script.google.com/macros/s/AKfycbz1JmA3BlqI4xqFll5FZHCVY-iPQDO5OU6DH0gRYPTqd8bqMa_TWz5Gzw3lvVYALcXtlA/exec";
      const POLL_INTERVAL = 3000;

      const showDebug = !location.search.includes("nodebug");
      if (!showDebug) document.getElementById("debug").style.display = "none";

      const logos  = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`logo${i + 1}`));
      const boxes  = allBoxes;
      const labels = Array.from({ length: NUM_BOXES }, (_, i) => document.getElementById(`label${i + 1}`));

      const dbEl = document.getElementById("debug-body");
      let lastLog = "";

      function log(lines) {
        const text = lines.join("\n");
        if (text === lastLog) return;
        lastLog = text;
        dbEl.innerHTML = lines.map((l) => {
          if (l.startsWith("❌")) return `<span class="err">${l}</span>`;
          if (l.startsWith("⚠️")) return `<span class="warn">${l}</span>`;
          if (l.startsWith("✅")) return `<span class="ok">${l}</span>`;
          return l;
        }).join("\n");
      }

      function applyLogo(logoEl, boxEl, labelEl, tag, logLines, idx) {
        if (tag) {
          boxEl.classList.add("has-tag");
          labelEl.innerHTML = `<span class="upcoming-text">BOOYAH</span>`;

          const path = `${LOGO_FOLDER}/${tag}${LOGO_EXT}`;
          logLines.push(`[${idx + 1}] tag="${tag}" → ${path}`);

          if (logoEl.getAttribute("data-tag") !== tag) {
            logoEl.setAttribute("data-tag", tag);
            logoEl.src = path;
          }

          logoEl.onerror = () => {
            logoEl.classList.remove("visible");
            log([...logLines, `❌ [${idx + 1}] Image load FAILED: ${path}`]);
          };
          logoEl.onload = () => {
            logoEl.classList.add("visible");
            log([...logLines, `✅ [${idx + 1}] Image loaded OK: ${path}`]);
          };

          if (logoEl.complete && logoEl.naturalWidth > 0) {
            logoEl.classList.add("visible");
          }
        } else {
          logLines.push(`[${idx + 1}] tag="" — no logo`);
          boxEl.classList.remove("has-tag");
          labelEl.innerHTML = `<span class="upcoming-text">UPCOMING</span>`;
          logoEl.src = "";
          logoEl.setAttribute("data-tag", "");
          logoEl.classList.remove("visible");
        }
      }

      async function fetchAndUpdate(firstFetch = false) {
        const logLines = [`⏱ ${new Date().toLocaleTimeString()} — fetching…`];
        log(logLines);

        try {
          const url = `${WEB_APP_URL}?_cb=${Date.now()}`;
          logLines.push(`URL: ${url.slice(0, 80)}…`);

          const res = await fetch(url);
          logLines.push(`HTTP status: ${res.status}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const text = await res.text();
          logLines.push(`Raw response (first 200):\n${text.slice(0, 200)}`);

          let data;
          try { data = JSON.parse(text); }
          catch (e) { throw new Error(`JSON parse failed: ${e.message}`); }

          if (!data.tags || !Array.isArray(data.tags)) {
            throw new Error(`No "tags" array in response. Keys: ${Object.keys(data).join(", ")}`);
          }

          logLines.push(`✅ Got ${data.tags.length} tags: [${data.tags.join(", ")}]`);

          let emptyCount = 0;

          data.tags.forEach((tag, i) => {
            if (!logos[i]) return;
			
			// After the forEach, fill any remaining boxes with UPCOMING
for (let i = data.tags.length; i < NUM_BOXES; i++) {
  boxes[i].classList.remove("has-tag");
  logos[i].src = "";
  logos[i].setAttribute("data-tag", "");
  logos[i].classList.remove("visible");
  labels[i].innerHTML = `<span class="upcoming-text">UPCOMING</span>`;
}

            if (tag) {
              applyLogo(logos[i], boxes[i], labels[i], tag, logLines, i);
            } else {
              emptyCount++;
              boxes[i].classList.remove("has-tag");
              logos[i].src = "";
              logos[i].setAttribute("data-tag", "");
              logos[i].classList.remove("visible");

              if (emptyCount === 1) {
                if (i === 5) {
                  logLines.push(`[${i + 1}] tag="" — COMING AHEAD (random: ${RANDOM_MAP.name})`);
                  boxes[i].querySelector('.map-img').src = RANDOM_MAP.img;
                  boxes[i].querySelector('.map-label').textContent = RANDOM_MAP.name;
                } else {
                  logLines.push(`[${i + 1}] tag="" — COMING AHEAD`);
                }
                labels[i].innerHTML = `<span class="upcoming-text">COMING AHEAD</span>`;
              } else {
                logLines.push(`[${i + 1}] tag="" — UPCOMING`);
                labels[i].innerHTML = `<span class="upcoming-text">UPCOMING</span>`;
              }
            }
          });

          log(logLines);
        } catch (err) {
          logLines.push(`❌ FETCH ERROR: ${err.message}`);
          log(logLines);
          console.warn("Web App fetch failed:", err.message);
        } finally {
          if (firstFetch) runCycle();
        }
      }

      fetchAndUpdate(true);
      setInterval(() => fetchAndUpdate(false), POLL_INTERVAL);
    </script>
  </body>
</html>
