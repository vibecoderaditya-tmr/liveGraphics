<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMR — Map Control</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="icon.ico">
<style>
  :root {
    --bg:      #2e3e4d;
    --panel:   #4a5d6b;
    --accent:  #62747d;
    --light:   #cadce6;
    --mid:     #9da6ad;
    --white:   #eef2f5;
    --glow:    rgba(202, 220, 230, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: var(--white);
  }

  /* Background grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(202,220,230,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(202,220,230,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top corner decoration */
  body::after {
    content: '';
    position: fixed;
    top: -80px;
    right: -80px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(202,220,230,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    width: 100%;
    max-width: 600px;
    padding: 40px 24px;
  }

  /* Header */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--mid);
    text-transform: uppercase;
  }

  .header h1 {
    font-size: 3.2rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1;
  }

  .header h1 span {
    color: var(--light);
  }

  .header-line {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--light), transparent);
    margin-top: 4px;
  }

  /* Map preview strip */
  .map-strip {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .map-thumb {
    flex: 1;
    aspect-ratio: 16/9;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid rgba(202,220,230,0.1);
    position: relative;
    transition: border-color 0.3s;
  }

  .map-thumb:hover {
    border-color: rgba(202,220,230,0.35);
  }

  .map-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.7) saturate(0.8);
    transition: filter 0.3s;
  }

  .map-thumb:hover img {
    filter: brightness(0.9) saturate(1);
  }

  .map-thumb-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    padding: 4px 2px;
    background: linear-gradient(transparent, rgba(46,62,77,0.9));
    color: var(--light);
  }

  /* Buttons */
  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .btn {
    flex: 1;
    padding: 20px 24px;
    background: transparent;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s, box-shadow 0.3s;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 0;
  }

  .btn:hover::before { transform: translateY(0); }
  .btn span { position: relative; z-index: 1; }
  .btn:active { transform: scale(0.98); }

  /* Launch btn — outlined light */
  .btn-launch {
    border: 2px solid var(--light);
    color: var(--light);
  }
  .btn-launch::before { background: var(--light); }
  .btn-launch:hover {
    color: var(--bg);
    box-shadow: 0 0 30px rgba(202,220,230,0.2);
  }

  /* Start btn — solid accent, disabled until launched */
  .btn-start {
    border: 2px solid var(--accent);
    color: var(--accent);
  }
  .btn-start::before { background: var(--accent); }
  .btn-start:hover:not(:disabled) {
    color: var(--bg);
    box-shadow: 0 0 30px rgba(98,116,125,0.4);
  }
  .btn-start:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
  }
  .btn-start.ready {
    border-color: #7ecfa0;
    color: #7ecfa0;
  }
  .btn-start.ready::before { background: #7ecfa0; }
  .btn-start.ready:hover { color: var(--bg); box-shadow: 0 0 30px rgba(126,207,160,0.3); }

  .btn-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Status bar */
  .status-bar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: rgba(74, 93, 107, 0.3);
    border: 1px solid rgba(202,220,230,0.08);
    border-radius: 4px;
  }

  .status-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-idle 2s infinite;
  }

  @keyframes pulse-idle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--mid);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-right {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  /* Last result */
  .last-result {
    width: 100%;
    text-align: center;
    padding: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-height: 32px;
    transition: color 0.3s;
  }

  .last-result.has-result {
    color: var(--light);
  }

  .last-result span {
    color: var(--mid);
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-tag">TMR Esports // Map Control</div>
    <h1>Map <span>Rand</span></h1>
    <div class="header-line"></div>
  </div>

  <div class="map-strip">
    <div class="map-thumb">
      <img src="maps/bermuda.webp" alt="Bermuda">
      <div class="map-thumb-label">Bermuda</div>
    </div>
    <div class="map-thumb">
      <img src="maps/kalahari.webp" alt="Kalahari">
      <div class="map-thumb-label">Kalahari</div>
    </div>
    <div class="map-thumb">
      <img src="maps/purgatory.webp" alt="Purgatory">
      <div class="map-thumb-label">Purgatory</div>
    </div>
    <div class="map-thumb">
      <img src="maps/nexterra.webp" alt="Nexterra">
      <div class="map-thumb-label">Nexterra</div>
    </div>
    <div class="map-thumb">
      <img src="maps/solara.webp" alt="Solara">
      <div class="map-thumb-label">Solara</div>
    </div>
  </div>

  <div class="btn-wrap">
    <div class="btn-row">
      <button class="btn btn-launch" id="launchBtn" onclick="launchRandomizer()">
        <span>⟶ &nbsp; Launch</span>
      </button>
      <button class="btn btn-start" id="startBtn" onclick="startRandomizing()" disabled>
        <span>▶ &nbsp; Start</span>
      </button>
    </div>
    <div class="btn-hint" id="btnHint">Launch randomizer first</div>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <div class="status-dot"></div>
      <div class="status-label">System Ready</div>
    </div>
    <div class="status-right">5 maps loaded</div>
  </div>

  <div class="last-result" id="lastResult">
    <span>no map selected yet</span>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  // ── Firebase Config ── REPLACE WITH YOUR OWN ──────────────
  var firebaseConfig = {
    apiKey:            "AIzaSyC21mdsgyIEqXT7ujFbi0xcVAMRZxxqB1I",
    authDomain:        "tmraditya-1ceb7.firebaseapp.com",
    databaseURL:       "https://tmraditya-1ceb7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "tmraditya-1ceb7",
    storageBucket:     "tmraditya-1ceb7.firebasestorage.app",
    messagingSenderId: "317037791388",
    appId:             "1:317037791388:web:755b5a18bb77aa140a4559"
  };
  // ──────────────────────────────────────────────────────────

  firebase.initializeApp(firebaseConfig);
  var db         = firebase.database();
  var statusRef  = db.ref('/maprand/status');
  var commandRef = db.ref('/maprand/command');
  var resultRef  = db.ref('/maprand/result');

  // Listen for randomizer ready
  statusRef.on('value', function(snap) {
    var val = snap.val();
    var startBtn = document.getElementById('startBtn');
    var btnHint  = document.getElementById('btnHint');
    if (val === 'ready') {
      startBtn.disabled = false;
      startBtn.classList.add('ready');
      btnHint.textContent = 'Randomizer ready — press Start';
    } else if (val === 'spinning') {
      startBtn.disabled = true;
      startBtn.classList.remove('ready');
      btnHint.textContent = 'Spinning...';
    } else {
      startBtn.disabled = true;
      startBtn.classList.remove('ready');
      btnHint.textContent = 'Launch randomizer first';
    }
  });

  // Listen for result
  resultRef.on('value', function(snap) {
    var val = snap.val();
    if (val && val !== 'none') {
      var el = document.getElementById('lastResult');
      el.innerHTML = 'Last selected → <strong>' + val + '</strong>';
      el.classList.add('has-result');
    }
  });

  function launchRandomizer() {
    // Clear previous state in Firebase
    statusRef.set('offline');
    commandRef.set('idle');
    window.open('randomizer.html', '_blank');
    document.getElementById('btnHint').textContent = 'Waiting for randomizer to load...';
    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').classList.remove('ready');
  }

  function startRandomizing() {
    commandRef.set('spin');
    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').classList.remove('ready');
    document.getElementById('btnHint').textContent = 'Spinning...';
  }
</script>

</body>
</html>
