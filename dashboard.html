<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMR · Operator</title>
<link rel="icon" href="icon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  var firebaseConfig = {
    apiKey:            "AIzaSyC21mdsgyIEqXT7ujFbi0xcVAMRZxxqB1I",
    authDomain:        "tmraditya-1ceb7.firebaseapp.com",
    databaseURL:       "https://tmraditya-1ceb7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "tmraditya-1ceb7",
    storageBucket:     "tmraditya-1ceb7.firebasestorage.app",
    messagingSenderId: "317037791388",
    appId:             "1:317037791388:web:755b5a18bb77aa140a4559"
  };

  var OPERATOR_PIN = "6558";

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  var msgRef   = db.ref("/session/bot_message");
  var reqRef   = db.ref("/session/input_request");
  var replyRef = db.ref("/session/input_reply");

  var authenticated = false;
  var lastTs        = null;
  var awaitingInput = false;

  function addLog(text, type) {
    type = type || "bot";
    // auto-detect elim/winner events from tmr.py hash messages
    if (type === "bot" && (text.startsWith("💀") || text.startsWith("🥇"))) {
      type = "event";
    }
    var lb   = document.getElementById("log-box");
    var wrap = document.createElement("div");
    wrap.className = "log-entry log-" + type;
    var time = new Date().toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit"});
    wrap.innerHTML =
      '<span class="log-time">' + time + '</span>' +
      '<span class="log-text">' + escHtml(text) + '</span>';
    lb.appendChild(wrap);
    lb.scrollTop = lb.scrollHeight;
  }

  function addHtml(html) {
    var lb   = document.getElementById("log-box");
    var wrap = document.createElement("div");
    wrap.className = "log-entry log-bot";
    var time = new Date().toLocaleTimeString("en-IN", {hour:"2-digit", minute:"2-digit"});
    wrap.innerHTML =
      '<span class="log-time">' + time + '</span>' +
      '<span class="log-text">' + html + '</span>';
    lb.appendChild(wrap);
    lb.scrollTop = lb.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
            .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
            .replace(/`(.+?)`/g,"<code>$1</code>");
  }

  function setStatus(online) {
    document.getElementById("status-dot").className = "dot " + (online ? "online" : "offline");
    document.getElementById("status-txt").textContent = online ? "LIVE" : "STANDBY";
  }

  function setInputState(active) {
    awaitingInput = active;
    var f = document.getElementById("op-input");
    var b = document.getElementById("send-btn");
    f.disabled    = !active;
    b.disabled    = !active;
    f.placeholder = active ? "Type reply…" : "Waiting for prompt…";
    if (active) setTimeout(function(){ f.focus(); }, 50);
  }

  function stripMd(s) {
    return s.replace(/\*\*(.+?)\*\*/g,"$1")
            .replace(/`(.+?)`/g,"$1")
            .replace(/```[\s\S]*?```/g,function(m){ return m.replace(/```/g,""); })
            .trim();
  }

  function checkPin() {
    var val = document.getElementById("pin-input").value;
    if (val === OPERATOR_PIN) {
      authenticated = true;
      var ps = document.getElementById("pin-screen");
      ps.style.opacity = "0";
      setTimeout(function(){
        ps.style.display = "none";
        var ms = document.getElementById("main-screen");
        ms.style.display = "flex";
        setTimeout(function(){ ms.style.opacity = "1"; }, 20);
      }, 350);
      startListeners();
      addLog("Panel connected — waiting for TMR tracker.", "sys");
    } else {
      var err = document.getElementById("pin-error");
      err.textContent = "incorrect pin";
      var inp = document.getElementById("pin-input");
      inp.value = "";
      inp.classList.add("shake");
      setTimeout(function(){ inp.classList.remove("shake"); }, 500);
    }
  }

  function pinKeydown(e)   { if (e.key === "Enter") checkPin(); }
  function inputKeydown(e) { if (e.key === "Enter") sendReply(); }

  function sendReply() {
    if (!awaitingInput) return;
    var val = document.getElementById("op-input").value.trim();
    if (!val) return;
    document.getElementById("op-input").value = "";
    setInputState(false);
    document.getElementById("prompt-box").style.display = "none";
    addLog(val, "opr");
    replyRef.set({ text: val, ready: true });
  }

  function startListeners() {
    // watch for clear signal from tmr.py on new run
    db.ref("/session/clear").on("value", function(snap) {
      if (snap.val() === true) {
        document.getElementById("log-box").innerHTML = "";
        document.getElementById("prompt-box").style.display = "none";
        setInputState(false);
        setStatus(false);
        addLog("Panel cleared — new TMR session started.", "sys");
      }
    });
    msgRef.on("value", function(snap) {
      var val = snap.val();
      if (!val || val.ack !== false) return;
      if (val.type === "html" && val.html) {
        addHtml(val.html);
      } else if (val.text) {
        addLog(val.text, "bot");
      }
      setStatus(true);
      msgRef.update({ ack: true });
    });
    reqRef.on("value", function(snap) {
      var val = snap.val();
      if (!val) return;
      if (val.ts === lastTs) return;
      lastTs = val.ts;
      addLog(val.prompt, "bot");
      var pb = document.getElementById("prompt-box");
      pb.textContent = stripMd(val.prompt);
      pb.style.display = "block";
      setInputState(true);
      setStatus(true);
    });
  }

  // ── Live Ticker Firebase ──────────────────────────────────
  var lgRef    = db.ref("/live-graphics");
  var stateRef = lgRef.child("state");
  var animRef  = lgRef.child("animate-from-to");

  var tickerState = null;
  var tickerAnim  = null;

  function setTicker(key, val) {
    if (key === "state") {
      stateRef.set(val);
      tickerState = val;
    } else {
      animRef.set(val);
      tickerAnim = val;
    }
    updateTickerUI();
  }

  function updateTickerUI() {
    ["btn-in","btn-out","btn-left","btn-right"].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.classList.remove("ticker-active");
    });
    if (tickerState === "IN")    { var e = document.getElementById("btn-in");    if(e) e.classList.add("ticker-active"); }
    if (tickerState === "OUT")   { var e = document.getElementById("btn-out");   if(e) e.classList.add("ticker-active"); }
    if (tickerAnim  === "LEFT")  { var e = document.getElementById("btn-left");  if(e) e.classList.add("ticker-active"); }
    if (tickerAnim  === "RIGHT") { var e = document.getElementById("btn-right"); if(e) e.classList.add("ticker-active"); }
  }

  lgRef.on("value", function(snap) {
    var val = snap.val() || {};
    tickerState = val["state"]           || null;
    tickerAnim  = val["animate-from-to"] || null;
    updateTickerUI();
  });

  // ── Panel Toggle ──────────────────────────────────────────
  var panelOpen = true;

  function togglePanel() {
    var panel  = document.getElementById("left-panel");
    var isMobile = window.innerWidth <= 480;

    if (isMobile) {
      panelOpen = !panelOpen;
      if (panelOpen) {
        panel.classList.remove("collapsed");
        panel.classList.add("mobile-open");
      } else {
        panel.classList.remove("mobile-open");
        panel.classList.add("collapsed");
      }
    } else {
      panelOpen = !panelOpen;
      if (panelOpen) {
        panel.classList.remove("collapsed");
      } else {
        panel.classList.add("collapsed");
      }
    }
  }

  // Start collapsed on mobile
  window.addEventListener("load", function() {
    if (window.innerWidth <= 480) {
      var panel = document.getElementById("left-panel");
      if (panel) {
        panel.classList.add("collapsed");
        panel.classList.remove("mobile-open");
        panelOpen = false;
      }
    }
  });

  window.addEventListener("resize", function() {
    var panel = document.getElementById("left-panel");
    if (!panel) return;
    if (window.innerWidth <= 480 && panelOpen) {
      panel.classList.remove("mobile-open");
      panel.classList.add("collapsed");
      panelOpen = false;
    }
  });

  // When keyboard opens on mobile, scroll log box to bottom
  // so input bar stays visible
  var opInput = document.getElementById ? document.getElementById("op-input") : null;
  if (opInput) {
    opInput.addEventListener("focus", function() {
      setTimeout(function() {
        var lb = document.getElementById("log-box");
        if (lb) lb.scrollTop = lb.scrollHeight;
      }, 300);
    });
  }

  // ── Export to Sheets ─────────────────────────────────────────
  var SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycby0HapV0QYMFdPS2Us038HHgB6_IKRKed2pTrHPGiciStXGf6Wn--wxW0wSxVTXRamI5A/exec";  // ← paste your Apps Script Web App URL here

  function exportToSheets() {
    var btn = document.getElementById("btn-export-sheets");
    var st  = document.getElementById("export-sheets-status");
    if (!SHEETS_WEBAPP_URL) {
      st.textContent = "no URL set";
      st.style.color = "var(--text-low)";
      return;
    }

    btn.disabled   = true;
    st.textContent = "reading firebase…";
    st.style.color = "var(--text-mid)";

    // Read all matchX nodes from Firebase
    db.ref("/matches").once("value", function(snap) {
      var allMatches = snap.val() || {};

      // Collect and sort match keys: match1, match2, match3...
      var matchKeys = Object.keys(allMatches)
        .filter(function(k) { return /^match\d+$/.test(k); })
        .sort(function(a, b) {
          return parseInt(a.replace("match","")) - parseInt(b.replace("match",""));
        });

      if (matchKeys.length === 0) {
        st.textContent = "no matches found";
        st.style.color = "var(--text-low)";
        btn.disabled = false;
        return;
      }

      // Build payload: array of match blocks
      // Each block = array of 12 rows sorted by 0_hash ascending
      // Each row = [0_hash, 1_teamTag, 5_totalKills]
      var payload = [];

      matchKeys.forEach(function(mk) {
        var mdata = allMatches[mk];
        var teams = [];

        Object.keys(mdata).forEach(function(key) {
          var node = mdata[key];
          if (typeof node !== "object" || node === null) return;
          if (!node["1_teamTag"]) return;  // skip non-team nodes
          teams.push({
            hash:  parseInt(node["0_hash"])  || 99,
            tag:   node["1_teamTag"]         || "",
            kills: parseInt(node["5_totalKills"]) || 0,
          });
        });

        // Sort ascending by 0_hash (1=winner on top, 12=first elim on bottom)
        teams.sort(function(a, b) { return a.hash - b.hash; });

        // Pad to 12 rows if needed
        while (teams.length < 12) {
          teams.push({ hash: "", tag: "", kills: "" });
        }

        payload.push({ match: mk, rows: teams });
      });

      st.textContent = "sending to sheets…";

      fetch(SHEETS_WEBAPP_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body:    "payload=" + encodeURIComponent(JSON.stringify({ data: payload })),
      })
      .then(function(res) { return res.json(); })
      .then(function(resp) {
        if (resp.status === "ok") {
          st.textContent = "✓ exported " + matchKeys.length + " match(es)";
          st.style.color = "var(--text-hi)";
        } else {
          st.textContent = "error: " + (resp.message || "unknown");
          st.style.color = "#7a6a6a";
        }
        btn.disabled = false;
        setTimeout(function() { st.textContent = ""; }, 6000);
      })
      .catch(function(err) {
        st.textContent = "fetch failed";
        st.style.color = "#7a6a6a";
        btn.disabled = false;
        console.error("Export error:", err);
      });
    });
  }
  window.exportToSheets = exportToSheets;

  // ── Force Roster ──────────────────────────────────────────
  var forceRosterRef = db.ref("/session/force_roster");
  var joinCountRef   = db.ref("/session/join_count");

  function forceRoster() {
    var btn = document.getElementById("btn-force-roster");
    var st  = document.getElementById("force-roster-status");
    if (btn.disabled) return;
    btn.disabled = true;
    forceRosterRef.set(true);
    st.textContent = "sent — waiting…";
    st.style.color = "var(--text-mid)";
    setTimeout(function() { st.textContent = ""; }, 5000);
  }
  window.forceRoster = forceRoster;

  joinCountRef.on("value", function(snap) {
    var n      = snap.val();
    var btn    = document.getElementById("btn-force-roster");
    var ctr    = document.getElementById("join-counter");
    var ctrVal = document.getElementById("join-count-val");
    var st     = document.getElementById("force-roster-status");
    if (n !== null && n !== undefined) {
      ctrVal.textContent    = n;
      ctr.style.display     = "block";
      btn.disabled          = false;
      btn.style.borderColor = "var(--c3)";
      btn.style.color       = "var(--text-hi)";
      st.textContent        = "";
    } else {
      ctr.style.display     = "none";
      btn.disabled          = true;
      btn.style.borderColor = "var(--border)";
      btn.style.color       = "var(--text-low)";
      st.textContent        = "";
    }
  });
</script>

<style>
/* ── PALETTE: only the 3 darkest from Lumora ─────────────────────────────
   #2e3e4d  darkest  — deepest bg
   #4a5d6b  mid      — surfaces, cards
   #62747d  slate    — borders, muted elements
   Text is derived as tints/opacities of these three only.
────────────────────────────────────────────────────────────────────────── */

:root {
  --c1: #2e3e4d;   /* darkest */
  --c2: #4a5d6b;   /* mid     */
  --c3: #62747d;   /* slate   */

  /* derived — all tints/mixes of the 3 colors, no outside colors */
  --bg:         #232f3a;           /* darker than c1 for depth */
  --surface:    var(--c1);         /* #2e3e4d */
  --card:       #374b5a;           /* between c1 and c2 */
  --border:     var(--c2);         /* #4a5d6b */
  --border-hi:  var(--c3);         /* #62747d */

  --text-hi:    #dde8ef;           /* brighter — primary readable text */
  --text-mid:   #b0c4cf;           /* mid tint — secondary, log messages */
  --text-low:   #8fa0ad;           /* muted — timestamps, labels */

  --accent:     #b0c4cf;           /* tint of c2, used for highlights */
  --live-dot:   #9ab0bc;           /* slightly lighter tint */

  --font-head:  'Syne', sans-serif;
  --font-mono:  'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text-hi);
  font-family: var(--font-mono);
  height: 100vh;
  overflow: hidden;
  /* subtle diagonal line texture using only the palette */
  background-image: repeating-linear-gradient(
    135deg,
    transparent,
    transparent 40px,
    rgba(74,93,107,0.06) 40px,
    rgba(74,93,107,0.06) 41px
  );
}

/* ── PIN SCREEN ──────────────────────────────────────────────────────────── */
#pin-screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg);
  background-image: repeating-linear-gradient(
    135deg,
    transparent, transparent 40px,
    rgba(74,93,107,0.06) 40px, rgba(74,93,107,0.06) 41px
  );
  z-index: 100;
  transition: opacity 0.35s ease;
}

.pin-wordmark {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 72px;
  letter-spacing: -3px;
  color: var(--text-hi);
  line-height: 1;
  margin-bottom: 6px;
  /* double-layer shadow using palette colors only */
  text-shadow:
    0 1px 0 var(--c3),
    0 2px 0 rgba(46,62,77,0.8);
}

.pin-rule {
  width: 48px; height: 2px;
  background: var(--c3);
  margin: 0 auto 6px;
}

.pin-tagline {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 5px;
  color: var(--text-low);
  text-transform: uppercase;
  margin-bottom: 48px;
}

.pin-card {
  width: 300px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 32px 28px 28px;
  position: relative;
  /* inner highlight top edge */
  box-shadow:
    inset 0 1px 0 rgba(98,116,125,0.4),
    0 8px 32px rgba(35,47,58,0.6);
}

.pin-label {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--text-low);
  text-transform: uppercase;
  margin-bottom: 10px;
}

#pin-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-bottom: 2px solid var(--c3);
  color: var(--text-hi);
  font-family: var(--font-mono);
  font-size: 26px;
  letter-spacing: 10px;
  text-align: center;
  padding: 12px 16px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 14px;
}

#pin-input:focus {
  background: var(--card);
  border-color: var(--c3);
  border-bottom-color: var(--text-hi);
}

.pin-btn {
  width: 100%;
  background: var(--c2);
  color: var(--text-hi);
  border: none;
  font-family: var(--font-head);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 4px;
  padding: 14px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.2s;
  box-shadow: inset 0 1px 0 rgba(98,116,125,0.3);
}

.pin-btn:hover { background: var(--c3); }
.pin-btn:active { background: var(--c1); }

#pin-error {
  font-size: 9px;
  letter-spacing: 3px;
  color: #7a6a6a;
  text-align: center;
  margin-top: 10px;
  min-height: 14px;
  text-transform: uppercase;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-5px); }
  40%,80% { transform: translateX(5px); }
}
.shake { animation: shake 0.4s ease; }

/* ── MAIN SCREEN ─────────────────────────────────────────────────────────── */

/* ── HEADER ──────────────────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  box-shadow: 0 1px 0 rgba(98,116,125,0.2);
}

.header-left { display: flex; align-items: baseline; gap: 14px; }

.h-logo {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.5px;
  color: var(--text-hi);
}

.h-sep {
  width: 1px; height: 14px;
  background: var(--border);
  align-self: center;
}

.h-sub {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--text-low);
  text-transform: uppercase;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c3);
  flex-shrink: 0;
  transition: background 0.3s;
}

.dot.online {
  background: var(--live-dot);
  animation: blink-dot 2s ease-in-out infinite;
}

@keyframes blink-dot {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

#status-txt {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--text-low);
  text-transform: uppercase;
}

/* ── LOG AREA ────────────────────────────────────────────────────────────── */
#log-box {
  flex: 1;
  overflow-y: auto;
  padding: 18px 24px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#log-box::-webkit-scrollbar { width: 3px; }
#log-box::-webkit-scrollbar-thumb { background: var(--border); }

.log-entry {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 14px;
  align-items: start;
  animation: fadeUp 0.12s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:none; }
}

.log-time {
  font-size: 9px;
  color: var(--text-low);
  padding-top: 3px;
  text-align: right;
  letter-spacing: 0.3px;
  opacity: 0.7;
}

.log-text {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-mid);
  white-space: pre-wrap;
  word-break: break-word;
}

.log-text code {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--card);
  color: var(--text-hi);
  padding: 1px 5px;
  border: 1px solid var(--border);
}

.log-text strong { color: var(--text-hi); font-weight: 500; }

.log-opr .log-time { color: var(--accent); opacity: 1; }
.log-opr .log-text { color: var(--text-hi); }
.log-sys .log-text { color: var(--text-low); font-size: 11px; font-style: italic; }
.log-event .log-text { color: var(--text-hi); font-weight: 500; }
.log-event .log-time { color: var(--text-mid); opacity: 1; }

/* ── PROMPT BOX ──────────────────────────────────────────────────────────── */
#prompt-box {
  display: none;
  margin: 0 24px 10px;
  padding: 11px 15px;
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 2px solid var(--c3);
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-hi);
  white-space: pre-wrap;
  line-height: 1.55;
  max-height: 140px;
  overflow-y: auto;
}

/* ── INPUT BAR ───────────────────────────────────────────────────────────── */
.input-bar {
  display: flex;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.input-prefix {
  display: flex;
  align-items: center;
  padding: 0 16px;
  color: var(--text-low);
  font-size: 9px;
  letter-spacing: 3px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

#op-input {
  flex: 1;
  background: var(--surface);
  border: none;
  color: var(--text-hi);
  font-family: var(--font-mono);
  font-size: 14px;
  padding: 17px 20px;
  outline: none;
  transition: background 0.15s;
}

#op-input:not(:disabled):focus { background: var(--card); }
#op-input::placeholder { color: var(--text-low); opacity: 0.6; }
#op-input:disabled { opacity: 0.3; cursor: not-allowed; }

#send-btn {
  background: var(--c2);
  color: var(--text-hi);
  border: none;
  border-left: 1px solid var(--border);
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 0 22px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background 0.15s;
  flex-shrink: 0;
}

#send-btn:hover:not(:disabled) { background: var(--c3); }
#send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

/* ── MOBILE ──────────────────────────────────────────────────────────────── */

/* ── TWO-COLUMN LAYOUT ───────────────────────────────────────────────────── */
#main-screen {
  display: none;
  flex-direction: column;
  height: 100vh;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.main-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── LEFT PANEL ──────────────────────────────────────────────────────────── */
.left-panel {
  width: 200px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 16px;
  gap: 16px;
}

.left-panel-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.left-panel-label {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--text-low);
  text-transform: uppercase;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

/* 2x2 ticker grid */
.ticker-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.ticker-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text-low);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 8px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s, color 0.2s, background 0.2s, box-shadow 0.2s;
  position: relative;
}

.ticker-btn:hover {
  border-color: var(--c3);
  color: var(--text-mid);
  background: var(--card);
}

.ticker-btn:active {
  background: var(--c2);
}

.ticker-btn.ticker-active {
  border-color: var(--text-hi);
  color: var(--text-hi);
  background: var(--card);
  box-shadow:
    inset 0 1px 0 rgba(98,116,125,0.3),
    0 0 12px rgba(176,196,207,0.12);
}

/* ── RIGHT — log + input ─────────────────────────────────────────────────── */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}


/* ── TOGGLE BUTTON ───────────────────────────────────────────────────────── */
.panel-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-low);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 5px 10px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  flex-shrink: 0;
}

.panel-toggle:hover {
  border-color: var(--c3);
  color: var(--text-mid);
}

/* ── LEFT PANEL COLLAPSED (desktop) ─────────────────────────────────────── */
.left-panel {
  transition: width 0.25s ease, padding 0.25s ease, opacity 0.2s ease;
  overflow: hidden;
}

.left-panel.collapsed {
  width: 0 !important;
  padding: 0 !important;
  opacity: 0;
  pointer-events: none;
}

/* ── MOBILE ──────────────────────────────────────────────────────────────── */
@media (max-width: 480px) {
  .pin-wordmark { font-size: 52px; }
  .pin-card { width: calc(100vw - 40px); }
  .h-sub, .h-sep { display: none; }
  .header { padding: 0 16px; height: 48px; }
  #log-box { padding: 12px 14px; padding-bottom: 80px; }
  #prompt-box {
    margin: 0 14px 6px;
    font-size: 11px;
    max-height: 100px;
    position: relative;
    z-index: 10;
  }

  /* Fix 100vh issue on mobile browsers with address bar */
  #main-screen {
    height: 100%;
    min-height: -webkit-fill-available;
    min-height: fill-available;
  }

  body {
    height: 100%;
    min-height: -webkit-fill-available;
    overflow: hidden;
  }

  html {
    height: -webkit-fill-available;
  }

  /* Right panel fills full height, input bar sticks to bottom */
  .right-panel {
    position: relative;
    height: 100%;
  }

  #log-box {
    /* Extra bottom padding so last messages aren't hidden behind fixed input */
    padding-bottom: 80px;
  }

  /* Input bar fixed to bottom — always visible even when keyboard opens */
  .input-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: var(--surface);
    border-top: 1px solid var(--border);
    /* Safe area for notch phones */
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .input-prefix { padding: 0 10px; font-size: 8px; }

  /* 16px minimum prevents iOS zoom on focus */
  #op-input {
    font-size: 16px;
    padding: 14px 14px;
    -webkit-appearance: none;
  }

  #send-btn {
    padding: 0 14px;
    font-size: 10px;
    min-width: 60px;
    /* Bigger tap target */
    min-height: 50px;
  }

  /* Prompt box also fixed above input bar when active */
  #prompt-box {
    position: fixed;
    bottom: 52px;
    left: 0;
    right: 0;
    margin: 0;
    border-left: none;
    border-right: none;
    border-top: 1px solid var(--c3);
    border-bottom: none;
    border-radius: 0;
    z-index: 49;
    max-height: 90px;
    padding: 10px 14px;
  }

  /* Left panel fullscreen on mobile */
  .left-panel {
    position: fixed;
    inset: 0;
    width: 100vw !important;
    height: 100%;
    min-height: -webkit-fill-available;
    z-index: 100;
    background: var(--bg);
    padding: 28px 20px !important;
    overflow-y: auto;
    opacity: 1;
    display: flex;
    transform: translateX(-100%);
    transition: transform 0.25s ease, opacity 0.25s ease;
  }

  .left-panel.mobile-open {
    transform: translateX(0);
    opacity: 1;
    pointer-events: all;
  }

  .left-panel.collapsed {
    width: 100vw !important;
    opacity: 0;
    pointer-events: none;
    transform: translateX(-100%);
  }

  /* Bigger tap targets for all buttons on mobile */
  .ticker-btn {
    padding: 14px 8px;
    font-size: 12px;
  }

  /* Close btn inside panel on mobile */
  .panel-close-mobile {
    display: flex;
  }

  /* Log entries slightly more compact */
  .log-entry { gap: 10px; }
  .log-text  { font-size: 12px; }
  .log-time  { font-size: 8px; }
}

@media (min-width: 481px) {
  .panel-close-mobile { display: none !important; }
}
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-wordmark">TMR</div>
  <div class="pin-rule"></div>
  <div class="pin-tagline">Operator Access Panel</div>
  <div class="pin-card">
    <div class="pin-label">Enter PIN to continue</div>
    <input id="pin-input" type="password" maxlength="8"
           onkeydown="pinKeydown(event)" autofocus>
    <button class="pin-btn" onclick="checkPin()">Authenticate</button>
    <div id="pin-error"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div class="header">
    <div class="header-left">
      <button class="panel-toggle" id="panel-toggle-btn" onclick="togglePanel()">&#9776;</button>
      <div class="h-logo">TMR</div>
      <div class="h-sep"></div>
      <div class="h-sub">Tournament Match Reporter · Operator</div>
    </div>
    <div class="status-badge">
      <div class="dot offline" id="status-dot"></div>
      <span id="status-txt">STANDBY</span>
    </div>
  </div>

  <div class="main-body">

    <!-- LEFT PANEL -->
    <div class="left-panel" id="left-panel">

      <!-- Mobile close button -->
      <button class="panel-close-mobile ticker-btn" onclick="togglePanel()" style="margin-bottom:12px;">✕ Close</button>

      <div class="left-panel-section">
        <div class="left-panel-label">Live Ticker</div>
        <div class="ticker-grid">
          <button class="ticker-btn" id="btn-left"  onclick="setTicker('animate-from-to','LEFT')">LEFT</button>
          <button class="ticker-btn" id="btn-right" onclick="setTicker('animate-from-to','RIGHT')">RIGHT</button>
          <button class="ticker-btn" id="btn-in"    onclick="setTicker('state','IN')">IN</button>
          <button class="ticker-btn" id="btn-out"   onclick="setTicker('state','OUT')">OUT</button>
        </div>
      </div>

      <div class="left-panel-section">
        <div class="left-panel-label">Roster</div>
        <div id="join-counter" style="display:none;font-size:11px;color:var(--text-mid);letter-spacing:1px;padding:6px 0 2px 0;">
          <span id="join-count-val">0</span> players joined
        </div>
        <button class="ticker-btn" id="btn-force-roster"
                onclick="forceRoster()" disabled
                style="width:100%;letter-spacing:2px;">
          Force Roster
        </button>
        <div id="force-roster-status" style="font-size:10px;color:var(--text-low);letter-spacing:1px;min-height:14px;margin-top:4px;"></div>
      </div>

      <div class="left-panel-section">
        <div class="left-panel-label">Export</div>
        <button class="ticker-btn" id="btn-export-sheets"
                onclick="exportToSheets()"
                style="width:100%;letter-spacing:2px;">
          Export to Sheets
        </button>
        <div id="export-sheets-status" style="font-size:10px;color:var(--text-low);letter-spacing:1px;min-height:14px;margin-top:4px;"></div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div id="log-box"></div>
      <div id="prompt-box"></div>

      <div class="input-bar">
        <div class="input-prefix">OPR</div>
        <input id="op-input" type="text"
               placeholder="Waiting for prompt…" disabled
               onkeydown="inputKeydown(event)">
        <button id="send-btn" disabled onclick="sendReply()">Send</button>
      </div>
    </div>

  </div>
</div>

</body>
</html>
