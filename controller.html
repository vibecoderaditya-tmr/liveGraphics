<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TMR · Controller</title>
<link rel="icon" href="icon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<link rel="stylesheet" href="css/controller/controller.css">
</head>
<body>

<div class="ctrl-wrap">

  <div class="ctrl-header">
    <div class="ctrl-badge">
      <div class="ctrl-badge-dot"></div>
      <span>Live</span>
    </div>
    <div class="ctrl-logo">TM<em>R</em></div>
    <div class="ctrl-title">Controller</div>
    <div class="ctrl-header-line"></div>
  </div>

  <div class="ctrl-body">

    <div class="col-broadcast">

      <div class="ctrl-section">
        <div class="section-label">Animation Type</div>
        <select class="ctrl-select" id="anim-type" onchange="setAnimType(this.value)">
          <option value="default">Default</option>
          <option value="curtain">Curtain</option>
          <option value="fade">Fade</option>
        </select>
      </div>

      <div class="ctrl-section">
        <div class="section-label">Live Ticker</div>
        <div class="btn-grid btn-grid-2">
          <button class="ctrl-btn" id="btn-left"  onclick="setTicker('animate-from-to','LEFT')">LEFT</button>
          <button class="ctrl-btn" id="btn-right" onclick="setTicker('animate-from-to','RIGHT')">RIGHT</button>
        </div>
        <div class="btn-grid btn-grid-1" style="margin-top:6px">
          <button class="ctrl-btn" id="btn-state-toggle" onclick="toggleState()">SHOW</button>
        </div>
        <div class="section-label" style="margin-top:8px">Points Column</div>
        <div class="btn-grid btn-grid-1">
          <button class="ctrl-btn" id="btn-pts-toggle" onclick="togglePts()">PTS: SHOWN</button>
        </div>
      </div>

      <div class="ctrl-section">
        <div class="section-label">Team Eliminated</div>
        <div style="display:flex;gap:5px">
          <select class="ctrl-select" id="team-elim-style" onchange="setTeamEliminatedStyle(this.value)" style="flex:1">
            <option value="center">Center</option>
            <option value="bmps">BMPS</option>
            <option value="standard">Standard</option>
          </select>
          <button class="ctrl-btn" id="btn-team-elim-in" onclick="setTeamElimCmd('in')" style="flex-shrink:0;min-width:70px">IN</button>
        </div>
      </div>

      <div class="ctrl-section">
        <div class="section-label">HUD Alignment</div>
        <div class="btn-grid btn-grid-2">
          <button class="ctrl-btn" id="btn-hud-left" onclick="setHudAlign('left')">LEFT</button>
          <button class="ctrl-btn" id="btn-hud-right" onclick="setHudAlign('right')">RIGHT</button>
        </div>
      </div>

    </div>

    <div class="col-match">

      <div class="ctrl-section">
        <div class="section-label">Map Randomizer</div>
        <div class="btn-grid btn-grid-1">
          <button class="ctrl-btn primary" id="btn-map-start" onclick="startMapRand()">▶ Spin</button>
        </div>
      </div>

      <div class="ctrl-section">
        <div class="section-label">Export</div>
        <div class="btn-grid btn-grid-1">
          <button class="ctrl-btn" id="btn-export-sheets" onclick="exportToSheets()">Export → Sheets</button>
        </div>
        <div id="export-sheets-status" class="ctrl-status"></div>
      </div>

    </div>

    <div class="col-util">

      <div class="ctrl-section">
        <div class="section-label">Win Rate</div>
        <div class="btn-grid btn-grid-1">
          <button class="ctrl-btn primary" onclick="setWinRateTest('in')">WR TEST</button>
        </div>
      </div>

      <div class="ctrl-section">
        <div class="section-label">Winner</div>
        <div class="btn-grid btn-grid-1">
          <button class="ctrl-btn" id="btn-winner-toggle" onclick="toggleWinner()">SHOW</button>
        </div>
        <div class="section-label" style="margin-top:10px">Tournament Stage</div>
        <div style="display:flex;gap:5px">
          <input type="text" id="winnerStageInput" placeholder="GRAND FINALS" style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text-low);font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:10px 8px;outline:none">
          <button class="ctrl-btn" onclick="setTournamentStage()" style="flex-shrink:0">SET</button>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="js/controller.js"></script>
</body>
</html>
