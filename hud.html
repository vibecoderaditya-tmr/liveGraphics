<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>HUD Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link rel="icon" type="image/x-icon" href="icon.ico">
<link rel="stylesheet" href="css/hud/hud.css">
</head>
<body>

<div class="hud-wrap">
  <div class="hud-section hud-left" id="hud-left">
    <div class="hud-char-wrap" id="hud-char-wrap">
      <img class="hud-char-img" id="hud-char-img" src="img/characters/villain.webp" alt="">
    </div>
    <div class="hud-ach-area" id="hud-ach-area">
      <div class="hud-ach-box hud-ach-player-box" id="hud-ach-player-box">
        <img class="hud-player-logo" id="hud-player-logo" src="img/logos/tmr.webp" alt="">
        <span class="hud-ach-player" id="hud-ach-player">ADITYA</span>
      </div>
      <div class="hud-ach-box hud-ach-name-box" id="hud-ach-name-box">
        <span class="hud-ach-name" id="hud-ach-name">SQUAD WIPE OUT</span>
      </div>
    </div>
  </div>
  <div class="hud-section hud-right" id="hud-right">
    <div class="hud-rbox" id="hud-teams">--</div>
    <div class="hud-rbox" id="hud-players">--</div>
  </div>
  <div class="hud-right-bottom" id="hud-right-bottom">
    <div class="hud-rb-row" id="hud-rb-1">
      <img class="rb-logo" src="" alt="">
      <span class="rb-name"></span>
      <img class="rb-logo" src="" alt="">
      <span class="rb-name"></span>
      <img class="rb-logo" src="" alt="">
    </div>
    <div class="hud-rb-row" id="hud-rb-2">
      <img class="rb-logo" src="" alt="">
      <span class="rb-name"></span>
      <img class="rb-logo" src="" alt="">
      <span class="rb-name"></span>
      <img class="rb-logo" src="" alt="">
    </div>
    <div class="hud-rb-row" id="hud-rb-3">
      <img class="rb-logo" src="" alt="">
      <span class="rb-name"></span>
      <img class="rb-logo" src="" alt="">
      <span class="rb-name"></span>
      <img class="rb-logo" src="" alt="">
    </div>
    <div class="hud-rb-row" id="hud-rb-4">
      <img class="rb-logo" src="" alt="">
      <span class="rb-name"></span>
      <img class="rb-logo" src="" alt="">
      <span class="rb-name"></span>
      <img class="rb-logo" src="" alt="">
    </div>
  </div>
</div>

<script src="js/hud.js"></script>

</body>
</html>
