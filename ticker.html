<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Live Ticker</title>
<link rel="icon" type="image/x-icon" href="icon.ico">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<link rel="stylesheet" href="css/ticker/ticker.css">
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-box">
    <div class="ticker-header">
      <span class="col-rank">RANK</span>
      <span class="col-team">TEAMS</span>
      <span class="col-alive">ALIVE</span>
      <span class="col-elims">ELIMS</span>
      <span class="col-pts">PTS</span>
      <span class="col-end"></span>
    </div>
    <div class="ticker-rows" id="ticker-rows">
    </div>
  </div>
</div>

<script src="js/ticker.js"></script>

</body>
</html>
