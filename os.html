<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tournament Leaderboard Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

<!-- ====================================================================
     FIREBASE SDK (Realtime Database) - compat build, no bundler needed
     Swap the version number below if you want a newer release.
==================================================================== -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    background: transparent;   /* keep transparent for OBS/vMix */
    overflow: hidden;
    font-family: 'Oswald', sans-serif;
  }

  .leaderboard-wrap {
    position: relative;
    width: 1920px;
    height: 1080px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 84px;          /* vertical placement on canvas, adjust as needed */
    gap: 48px;
  }

  .column {
    width: 936px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 0 20px;
    overflow: hidden;
  }

  @keyframes headerDrop {
    from { opacity: 0; transform: translateY(-60px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes rowInLeft {
    from { opacity: 0; clip-path: inset(0 100% 0 0); }
    to   { opacity: 1; clip-path: inset(0 0 0 0); }
  }

  @keyframes rowInRight {
    from { opacity: 0; clip-path: inset(0 0 0 100%); }
    to   { opacity: 1; clip-path: inset(0 0 0 0); }
  }

  .header-bar {
    width: 100%;
    height: 32px;
    margin-bottom: 8px;
    background-image: url('header.webp');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    animation: headerDrop 0.6s ease-in-out forwards;
  }

  #col-left .row {
    opacity: 0;
    animation: rowInLeft 0.5s ease-in-out forwards;
  }
  #col-right .row {
    opacity: 0;
    animation: rowInRight 0.5s ease-in-out forwards;
  }
  #col-left .row[data-slot="0"]  { animation-delay: 0.65s; }
  #col-left .row[data-slot="1"]  { animation-delay: 0.75s; }
  #col-left .row[data-slot="2"]  { animation-delay: 0.85s; }
  #col-left .row[data-slot="3"]  { animation-delay: 0.95s; }
  #col-left .row[data-slot="4"]  { animation-delay: 1.05s; }
  #col-left .row[data-slot="5"]  { animation-delay: 1.15s; }
  #col-right .row[data-slot="6"] { animation-delay: 0.65s; }
  #col-right .row[data-slot="7"] { animation-delay: 0.75s; }
  #col-right .row[data-slot="8"] { animation-delay: 0.85s; }
  #col-right .row[data-slot="9"] { animation-delay: 0.95s; }
  #col-right .row[data-slot="10"]{ animation-delay: 1.05s; }
  #col-right .row[data-slot="11"]{ animation-delay: 1.15s; }

  .row {
    position: relative;
    width: 100%;
    height: 76px;
    background-image: url('rows.webp');
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }

  .row span {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: #f3d9a4;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
  }

  /* Column x-positions, derived from the header.webp label positions */
  .f-rank    { left: 3%;  width: 8%;  text-align: center; font-size: 30px; font-weight: 700; }
  .f-team    { left: 12%; width: 38%; text-align: left;   font-size: 26px; text-overflow: ellipsis; display: flex; align-items: center; gap: 10px; }
  .f-team-logo { width: 42px; height: 42px; object-fit: contain; flex-shrink: 0; position: relative; left: 11px; }
  .f-team-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-left: 69px; }
  .f-match   { left: 50%; width: 9%;  text-align: center; font-size: 24px; }
  .f-booyah  { left: 60%; width: 10%; text-align: center; font-size: 24px; }
  .f-kills   { left: 70%; width: 9%;  text-align: center; font-size: 24px; }
  .f-place   { left: 80%; width: 9%;  text-align: center; font-size: 24px; }
  .f-total   { left: 90%; width: 9%;  text-align: center; font-size: 26px; font-weight: 700; color: #ffe9b8; }
</style>
</head>
<body>

<div class="leaderboard-wrap">
  <div class="column" id="col-left">
    <div class="header-bar"></div>
    <div class="row" data-slot="0"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="1"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="2"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="3"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="4"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="5"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
  </div>

  <div class="column" id="col-right">
    <div class="header-bar"></div>
    <div class="row" data-slot="6"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="7"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="8"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="9"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="10"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
    <div class="row" data-slot="11"><span class="f-rank"></span><span class="f-team"></span><span class="f-match"></span><span class="f-booyah"></span><span class="f-kills"></span><span class="f-place"></span><span class="f-total"></span></div>
  </div>
</div>

<script>
const isFileProtocol = location.protocol === "file:";
function fileRelativeDir() {
  const p = location.pathname;
  return p.substring(0, p.lastIndexOf("/") + 1);
}
const LOGO_BASE = isFileProtocol ? `${fileRelativeDir()}logos/` : "/logos/";
const LOGO_EXT  = ".webp";

function buildCaseVariants(name) {
  const clean = String(name).trim().replace(/[^a-zA-Z0-9_-]/g, "");
  const lower = clean.toLowerCase();
  const upper = clean.toUpperCase();
  const capitalized = lower.charAt(0).toUpperCase() + lower.slice(1);
  return [...new Set([lower, upper, capitalized])];
}

function loadLogoCaseInsensitive(imgEl, tag) {
  const variants = buildCaseVariants(tag);
  let attempt = 0;
  function tryNext() {
    if (attempt >= variants.length) {
      imgEl.style.display = "none";
      imgEl.onerror = null;
      return;
    }
    imgEl.src = LOGO_BASE + variants[attempt] + LOGO_EXT;
    attempt++;
    imgEl.onerror = tryNext;
  }
  tryNext();
}

const firebaseConfig = {
  apiKey:            "AIzaSyC21mdsgyIEqXT7ujFbi0xcVAMRZxxqB1I",
  authDomain:        "tmraditya-1ceb7.firebaseapp.com",
  databaseURL:       "https://tmraditya-1ceb7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "tmraditya-1ceb7",
  storageBucket:     "tmraditya-1ceb7.firebasestorage.app",
  messagingSenderId: "317037791388",
  appId:             "1:317037791388:web:755b5a18bb77aa140a4559"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const rowEls = Array.from(document.querySelectorAll('.row'))
  .sort((a, b) => Number(a.dataset.slot) - Number(b.dataset.slot));

// ── Render ──────────────────────────────────────────────────────
function renderTeams(teamsObj, matchCounts) {
  // Convert 0_teams object to array, tag is the key
  const entries = Object.keys(teamsObj || {}).map(tag => ({
    tag:       tag,
    name:      teamsObj[tag]["1_teamName"] || tag,
    rank:      Number(teamsObj[tag]["0_rank"]) || 99,
    booyahs:   Number(teamsObj[tag]["2_booyahs"]) || 0,
    kills:     Number(teamsObj[tag]["3_killPoints"]) || 0,
    place:     Number(teamsObj[tag]["4_placePoints"]) || 0,
    total:     Number(teamsObj[tag]["5_totalPoints"]) || 0,
    matches:   (matchCounts && matchCounts[tag]) || 0,
  }));

  // Sort by total descending
  entries.sort((a, b) => b.total - a.total);

  for (let i = 0; i < 12; i++) {
    const rowEl = rowEls[i];
    if (!rowEl) continue;
    const e = entries[i];

    const setText = (cls, val) => { rowEl.querySelector('.' + cls).textContent = val; };

    if (e) {
      setText('f-rank',   i + 1);
      setText('f-match',  e.matches);
      setText('f-booyah', e.booyahs || '');
      setText('f-kills',  e.kills);
      setText('f-place',  e.place);
      setText('f-total',  e.total);

      // Team cell: logo + name
      const teamEl = rowEl.querySelector('.f-team');
      const existingImg = teamEl.querySelector('.f-team-logo');
      if (existingImg) {
        loadLogoCaseInsensitive(existingImg, e.tag);
      } else {
        teamEl.textContent = '';
        const img = document.createElement('img');
        img.className = 'f-team-logo';
        img.alt = '';
        teamEl.appendChild(img);
        loadLogoCaseInsensitive(img, e.tag);
      }
      // append a text node for the name (after the img)
      const txtNode = teamEl.querySelector('.f-team-name');
      if (txtNode) {
        txtNode.textContent = e.name;
      } else {
        const span = document.createElement('span');
        span.className = 'f-team-name';
        span.textContent = e.name;
        teamEl.appendChild(span);
      }
    } else {
      setText('f-rank',   '');
      setText('f-match',  '');
      setText('f-booyah', '');
      setText('f-kills',  '');
      setText('f-place',  '');
      setText('f-total',  '');
      const teamEl = rowEl.querySelector('.f-team');
      teamEl.textContent = '';
    }
  }
}

// ── Firebase: team data + match counts from /matches ────────────
function isMetaKey(k) {
  return k === "0_mapID" || k === "1_mapName" || k === "2_matchID" || k === "3_status" || k === "4_BOOYAH";
}

db.ref("/matches").on('value', snap => {
  const data = snap.val() || {};
  const teamsObj = data["0_teams"] || {};
  const teamTags = Object.keys(teamsObj);

  // Count matches per team
  const matchCounts = {};
  teamTags.forEach(tag => matchCounts[tag] = 0);
  Object.keys(data).forEach(key => {
    if (key === "0_teams") return;
    const matchNode = data[key];
    if (matchNode && typeof matchNode === 'object') {
      teamTags.forEach(tag => {
        if (matchNode[tag] !== undefined) matchCounts[tag]++;
      });
    }
  });

  renderTeams(teamsObj, matchCounts);
});

// ── On/Off toggle ────────────────────────────────────────────────
db.ref('/live-graphics/osOnOff').on('value', snap => {
  const val = snap.val();
  const wrap = document.querySelector('.leaderboard-wrap');
  if (val === 'OFF') {
    wrap.style.display = 'none';
  } else {
    wrap.style.display = 'flex';
    // Re-trigger all animations
    document.querySelectorAll('.header-bar, .row').forEach(el => {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    });
  }
});
</script>

</body>
</html>
