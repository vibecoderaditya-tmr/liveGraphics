<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMR — Map Randomizer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #2e3e4d;
    --panel: #4a5d6b;
    --light: #cadce6;
    --mid:   #9da6ad;
    --white: #eef2f5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Barlow Condensed', sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
  }

  /* Fullscreen map image */
  #mapBg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    transition: opacity 0.08s ease;
    filter: brightness(0.55) saturate(0.85);
  }

  /* Dark overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(46,62,77,0.45) 0%,
      rgba(46,62,77,0.2) 40%,
      rgba(46,62,77,0.2) 60%,
      rgba(46,62,77,0.7) 100%
    );
    z-index: 1;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: 0;
  }

  /* Top label */
  .top-label {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.25em;
    color: rgba(202,220,230,0.5);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Map name display */
  .map-name-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .map-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: rgba(202,220,230,0.6);
    text-transform: uppercase;
  }

  #mapName {
    font-size: clamp(5rem, 14vw, 11rem);
    font-weight: 900;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 0.9;
    color: var(--white);
    text-align: center;
    text-shadow:
      0 0 80px rgba(202,220,230,0.0),
      0 4px 40px rgba(0,0,0,0.6);
    transition: text-shadow 0.3s;
    will-change: transform;
  }

  #mapName.locked {
    text-shadow:
      0 0 60px rgba(202,220,230,0.8),
      0 0 120px rgba(202,220,230,0.4),
      0 4px 40px rgba(0,0,0,0.6);
    animation: nameGlow 1.5s ease-out forwards;
  }

  @keyframes nameGlow {
    0%   { letter-spacing: 0.02em; }
    30%  { letter-spacing: 0.08em; }
    100% { letter-spacing: 0.04em; }
  }

  /* Speed indicator dots */
  .speed-dots {
    display: flex;
    gap: 8px;
    margin-top: 32px;
  }

  .speed-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(202,220,230,0.2);
    transition: background 0.2s;
  }

  .speed-dot.active {
    background: var(--light);
    box-shadow: 0 0 8px rgba(202,220,230,0.6);
  }

  /* Lock flash overlay */
  #lockFlash {
    position: fixed;
    inset: 0;
    background: rgba(202,220,230,0.15);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
  }

  #lockFlash.flash {
    animation: flashAnim 0.6s ease-out forwards;
  }

  @keyframes flashAnim {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Locked border frame */
  #lockedFrame {
    position: fixed;
    inset: 20px;
    border: 2px solid rgba(202,220,230,0);
    border-radius: 4px;
    z-index: 3;
    pointer-events: none;
    transition: border-color 0.5s, box-shadow 0.5s;
  }

  #lockedFrame.show {
    border-color: rgba(202,220,230,0.5);
    box-shadow:
      inset 0 0 60px rgba(202,220,230,0.06),
      0 0 60px rgba(202,220,230,0.1);
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(202,220,230,0.35);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .bottom-bar .divider {
    width: 1px;
    height: 12px;
    background: rgba(202,220,230,0.2);
  }

  /* State: idle */
  #stateLabel {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(202,220,230,0.4);
    text-transform: uppercase;
    margin-top: 24px;
    min-height: 20px;
    transition: color 0.3s;
  }

  #stateLabel.spinning { color: rgba(202,220,230,0.5); }
  #stateLabel.locked   { color: var(--light); }

  /* Corner TMR tag */
  .corner-tag {
    position: absolute;
    top: 38px;
    right: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(202,220,230,0.25);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<img id="mapBg" src="maps/bermuda.webp" alt="">
<div class="overlay"></div>
<div id="lockFlash"></div>
<div id="lockedFrame"></div>

<div class="content">

  <div class="top-label">TMR Esports // Map Randomizer</div>
  <div class="corner-tag">tmresports</div>

  <div class="map-name-wrap">
    <div class="map-eyebrow" id="eyebrow">Selecting map</div>
    <div id="mapName">—</div>
    <div class="speed-dots">
      <div class="speed-dot active" id="d1"></div>
      <div class="speed-dot active" id="d2"></div>
      <div class="speed-dot active" id="d3"></div>
      <div class="speed-dot active" id="d4"></div>
      <div class="speed-dot active" id="d5"></div>
    </div>
    <div id="stateLabel">Initializing...</div>
  </div>

  <div class="bottom-bar">
    <span>Free Fire Esports</span>
    <div class="divider"></div>
    <span>Map Pool S1</span>
    <div class="divider"></div>
    <span id="bottomMap">—</span>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────
  const MAPS = [
    { name: 'Bermuda',   img: 'maps/bermuda.webp'   },
    { name: 'Kalahari',  img: 'maps/kalahari.webp'  },
    { name: 'Purgatory', img: 'maps/purgatory.webp' },
    { name: 'Nexterra',  img: 'maps/nexterra.webp'  },
    { name: 'Solara',    img: 'maps/solara.webp'    },
  ];

  // Speed stages: [interval ms, duration ms]
  const STAGES = [
    [80,  1200],   // very fast
    [160, 900],    // fast
    [300, 700],    // medium
    [500, 600],    // slow
    [800, 500],    // very slow
    [1100, 0],     // lock
  ];

  const DOTS = ['d1','d2','d3','d4','d5'];

  // ── State ────────────────────────────────────────────────
  let selectedMap = null;   // ← the variable you asked for
  let currentIndex = 0;
  let spinning = false;
  let spinTimer = null;

  // ── DOM refs ─────────────────────────────────────────────
  const mapBg      = document.getElementById('mapBg');
  const mapName    = document.getElementById('mapName');
  const eyebrow    = document.getElementById('eyebrow');
  const stateLabel = document.getElementById('stateLabel');
  const lockFlash  = document.getElementById('lockFlash');
  const lockedFrame= document.getElementById('lockedFrame');
  const bottomMap  = document.getElementById('bottomMap');

  // ── Preload images ────────────────────────────────────────
  MAPS.forEach(m => { const i = new Image(); i.src = m.img; });

  // ── Show a map frame ─────────────────────────────────────
  function showMap(index) {
    const map = MAPS[index];
    mapBg.src = map.img;
    mapName.textContent = map.name;
    mapName.classList.remove('locked');
  }

  // ── Update speed dots ─────────────────────────────────────
  function updateDots(stageIndex) {
    // More dots = faster
    const activeDots = Math.max(0, 5 - stageIndex);
    DOTS.forEach((id, i) => {
      document.getElementById(id).classList.toggle('active', i < activeDots);
    });
  }

  // ── Main spin logic ────────────────────────────────────────
  function startSpin() {
    if (spinning) return;
    spinning = true;

    // Pre-determine winner
    const winnerIndex = Math.floor(Math.random() * MAPS.length);

    stateLabel.textContent = 'Randomizing...';
    stateLabel.className = 'spinning';
    eyebrow.textContent = 'Selecting map';
    mapName.classList.remove('locked');
    lockedFrame.classList.remove('show');

    let stageIndex = 0;
    let elapsed = 0;

    function runStage() {
      if (stageIndex >= STAGES.length - 1) {
        // Final lock
        lock(winnerIndex);
        return;
      }

      const [interval, duration] = STAGES[stageIndex];
      updateDots(stageIndex);
      elapsed = 0;

      spinTimer = setInterval(() => {
        // Cycle through maps randomly (not landing on winner yet)
        let next;
        do {
          next = Math.floor(Math.random() * MAPS.length);
        } while (next === currentIndex);
        currentIndex = next;
        showMap(currentIndex);

        elapsed += interval;
        if (elapsed >= duration) {
          clearInterval(spinTimer);
          stageIndex++;
          runStage();
        }
      }, interval);
    }

    runStage();
  }

  // ── Lock on winner ─────────────────────────────────────────
  function lock(winnerIndex) {
    clearInterval(spinTimer);
    spinning = false;

    currentIndex = winnerIndex;
    showMap(winnerIndex);

    // Glow effects
    setTimeout(() => {
      mapName.classList.add('locked');
      mapBg.style.filter = 'brightness(0.65) saturate(1.1)';

      // Flash
      lockFlash.classList.remove('flash');
      void lockFlash.offsetWidth;
      lockFlash.classList.add('flash');

      // Frame
      lockedFrame.classList.add('show');

      // Update labels
      eyebrow.textContent = 'Selected map';
      stateLabel.textContent = '— locked —';
      stateLabel.className = 'locked';
      bottomMap.textContent = MAPS[winnerIndex].name;

      // Store in variable
      selectedMap = MAPS[winnerIndex].name;
      console.log('Selected map:', selectedMap);

      // Notify dashboard
      if (window.opener) {
        try {
          window.opener.postMessage({ type: 'MAP_SELECTED', map: selectedMap }, '*');
        } catch(e) {}
      }

      updateDots(99); // all dots off
    }, 80);
  }

  // ── Init ───────────────────────────────────────────────────
  window.addEventListener('load', () => {
    showMap(0);
    mapBg.style.filter = 'brightness(0.4) saturate(0.6)';
    stateLabel.textContent = 'Ready';
    eyebrow.textContent = 'Awaiting signal';
    updateDots(99);

    // Notify dashboard that randomizer is ready
    if (window.opener) {
      try {
        window.opener.postMessage({ type: 'RANDOMIZER_READY' }, '*');
      } catch(e) {}
    }
  });

  // Listen for START_SPIN from dashboard
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'START_SPIN') {
      mapBg.style.filter = 'brightness(0.55) saturate(0.85)';
      startSpin();
    }
  });
</script>

</body>
</html>
